name: fetch-laws-and-publish

on:
  schedule:
    # 法令は更新頻度が低いが、1回/日だとその回がドロップされた日に更新が丸ごと欠落する。
    # 分は :00 を避ける（GitHubは毎時0分が最も混雑し schedule がドロップ/遅延しやすい＝公式注意）。
    # 朝・昼・夜の3枠に冗長化し、1枠スキップされても当日中に更新される（reg-monitorと同方針）。
    - cron: '37 22,4,10 * * *'   # JST 07:37 / 13:37 / 19:37
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-law
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: PDF抽出ツール(poppler)導入
        run: sudo apt-get update -qq && sudo apt-get install -y -qq poppler-utils

      - name: e-Gov法令＋金融庁ガイドラインを取得し構造化（更新分を差分検出）
        working-directory: law-viewer
        run: node fetcher.js

      - name: 市況データ取得（ドル円/日経平均/NYダウ/ビットコイン）
        working-directory: law-viewer
        run: node market.js || echo "市況取得は失敗（市況バーは欠落値表示・本体に影響なし）"

      - name: 差分データをコミット（蓄積を永続化）
        run: |
          git config user.name "law-viewer-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add law-viewer-site/data
          git commit -m "chore: update law data ($(date -u +%FT%TZ))" || echo "変更なし"
          git push || echo "push対象なし"

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: law-viewer-site
      - id: deployment
        uses: actions/deploy-pages@v4

      # いずれかのステップが失敗したらSlackへ通知（沈黙の取得失敗を検知）。
      # SLACK_WEBHOOK_URL secret が未設定なら何もしない（エラーにしない）。設定は repo Settings → Secrets → Actions。
      - name: 失敗時にSlack通知（SLACK_WEBHOOK_URL 設定時のみ）
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then echo "SLACK_WEBHOOK_URL 未設定のため通知スキップ"; exit 0; fi
          text=":rotating_light: *finoject Financial Regulation Deck｜法令巡回が失敗* — 取得/公開が止まっている可能性があります。"$'\n'"$RUN_URL"
          payload=$(jq -n --arg t "$text" '{text:$t}')
          curl -sS -X POST -H 'Content-Type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL" || true
