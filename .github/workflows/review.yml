name: ai-review

# main へのソース変更ごとに、Claude(Sonnet) が差分を自動レビューし、
# 「🤖 AI自動レビュー（自動更新）」Issue にコメントを追記する（自己回帰的な品質向上の“批評役”）。
# データ更新(crawl.ymlのdata/コミット)では走らない。Issueに書くだけ＝pushしないのでループしない。
on:
  push:
    branches: [main]
    paths:
      - 'law-viewer-site/**'
      - 'law-viewer/**'
      - 'proxy/**'
      - '.github/scripts/ai-review.js'
      - '.github/workflows/review.yml'
      - '!law-viewer-site/data/**'
  workflow_dispatch:            # 手動でも再レビューできる（※paths フィルタは push/PR 専用で dispatch には適用されない＝GitHub Actions仕様）
    inputs:
      base_sha:
        description: 'diff の基準SHA（省略時は HEAD~1＝直近コミットを対象）'
        required: false
        default: ''

permissions:
  contents: read
  issues: write

concurrency:
  group: ai-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 親コミットとの差分を取るため全履歴

      - name: 差分を抽出（ソースのみ・データ除外）
        run: |
          if [ -n "${{ github.event.inputs.base_sha }}" ]; then
            BEFORE="${{ github.event.inputs.base_sha }}"              # 手動指定があれば最優先
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BEFORE="$(git rev-parse HEAD~1 2>/dev/null || true)"      # 手動実行は直近コミットを対象
          else
            BEFORE="${{ github.event.before }}"                       # push: 直前のmain
            if echo "$BEFORE" | grep -qE '^0+$'; then BEFORE="$(git rev-parse HEAD~1 2>/dev/null || true)"; fi
          fi
          # 空ツリー差分(=全履歴=コスト爆発)は使わない。解決不能なら直近コミットのみ(=最悪でも空差分→投稿スキップ)に限定。
          if [ -z "$BEFORE" ]; then BEFORE="${{ github.sha }}"; fi
          git diff --unified=3 "$BEFORE" "${{ github.sha }}" -- \
            'law-viewer-site/**' 'law-viewer/**' 'proxy/**' '.github/scripts/**' '.github/workflows/review.yml' \
            ':(exclude)law-viewer-site/data/**' > diff.patch || true
          echo "diff bytes: $(wc -c < diff.patch)"

      - name: Claude(Sonnet) でレビュー
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REVIEW_MODEL: claude-sonnet-4-6
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          DIFF_FILE: diff.patch
        run: node .github/scripts/ai-review.js

      - name: 結果を「🤖 AI自動レビュー」Issueへ追記
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -s review.md ]; then echo "レビュー本文なし（差分なし/キー未設定）→ 投稿スキップ"; exit 0; fi
          TITLE="🤖 AI自動レビュー（自動更新）"
          NUM=$(gh issue list --state open --limit 100 --json number,title \
                  --jq ".[] | select(.title==\"$TITLE\") | .number" | head -n1)
          if [ -z "$NUM" ]; then
            URL=$(gh issue create --title "$TITLE" \
                   --body "main への変更ごとに、Claude(Sonnet) による自動レビューをこのIssueへ追記します。指摘は自動生成であり、最終判断は人間が行ってください。不要になったらこのIssueをClose、または review.yml を無効化してください。")
            NUM=$(echo "$URL" | tail -n1 | sed 's#.*/##')
          fi
          gh issue comment "$NUM" --body-file review.md
          echo "Issue #$NUM へ投稿しました"
