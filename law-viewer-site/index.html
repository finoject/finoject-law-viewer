<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>finoject 法令ビューア｜資金決済・犯収法・金商法</title>
<style>
  :root{ --bg:#0b1220; --panel:#111a2c; --line:#26334d; --fg:#e8eefb; --muted:#8da3c6; --accent:#2e6cf0; --hi:#fde68a; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:"Segoe UI","Hiragino Sans","Meiryo",sans-serif; -webkit-text-size-adjust:100%; }
  #app{ display:flex; height:100vh; overflow:hidden; }

  /* サイドバー */
  #side{ width:300px; flex:none; background:var(--panel); border-right:1px solid var(--line);
    overflow-y:auto; padding:12px; }
  #side h1{ font-size:15px; margin:2px 4px 2px; cursor:pointer; }
  #side h1:hover{ color:#9fd0ff; }
  #side .sub{ font-size:11px; color:var(--muted); margin:0 4px 8px; }
  #toReg{ display:inline-block; font-size:12px; color:#9fd0ff; text-decoration:none; margin:0 4px 10px;
    padding:5px 10px; border:1px solid #2b66c0; border-radius:8px; background:#13243f; }
  #toReg:hover{ background:#1c3a63; }
  .grp{ font-size:11px; color:var(--muted); margin:14px 6px 6px; letter-spacing:.04em; border-left:3px solid var(--accent); padding-left:8px; }
  .law{ display:block; width:100%; text-align:left; cursor:pointer; border:1px solid var(--line);
    background:#16223a; color:#cfe0ff; border-radius:8px; padding:9px 10px; margin:6px 0; font-size:13px; line-height:1.4; }
  .law:hover{ border-color:var(--accent); }
  .law.active{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .law .tag{ font-size:10px; color:var(--muted); }
  .law.active .tag{ color:#dbe8ff; }
  .law .upd{ display:inline-block; font-size:10px; background:#fbbf24; color:#0b1220; border-radius:4px; padding:0 5px; margin-left:4px; }

  /* 本体 */
  #main{ flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #top{ flex:none; background:rgba(11,18,32,.96); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:12px 18px; }
  #burger{ display:none; }
  .topbtns{ display:flex; gap:8px; margin-bottom:8px; }
  #home{ background:#16223a; color:#cfe0ff; border:1px solid #2b66c0; border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; }
  #home:hover{ background:#1c3a63; }
  #lawTitle{ font-size:17px; font-weight:700; margin:0; }
  #lawMeta{ font-size:11px; color:var(--muted); margin:3px 0 0; }
  #lawMeta a{ color:#7fb0ff; }
  #search{ margin-top:9px; width:100%; max-width:520px; padding:8px 11px; border-radius:8px; border:1px solid var(--line);
    background:#0e1626; color:var(--fg); font-size:13px; }
  #gsearch{ display:block; width:100%; max-width:680px; padding:10px 13px; border-radius:9px; border:1px solid #3a6bd0;
    background:#0e1626; color:var(--fg); font-size:14px; margin-bottom:8px; }
  #gsearch:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(46,108,240,.3); }
  /* 横断検索の結果 */
  .gres-head{ font-size:13px; color:var(--muted); margin:4px 0 12px; }
  .gsec{ font-size:14px; font-weight:700; color:#bcd0f0; margin:18px 0 4px; border-left:3px solid var(--accent); padding-left:8px; }
  .gsec span{ font-weight:400; color:var(--muted); font-size:12px; }
  .ghit{ display:block; text-decoration:none; color:var(--fg); border:1px solid var(--line); border-radius:8px;
    padding:8px 11px; margin:6px 0; background:#0f1a2e; font-size:13px; line-height:1.7; }
  .ghit:hover{ border-color:var(--accent); background:#13243f; }
  .ghit .gnum{ font-weight:700; color:#7fb0ff; }
  .ghit .gcap{ color:var(--muted); margin-left:6px; }
  .ghit .gsnip{ display:block; color:#cdd8ee; margin-top:3px; }
  #doc{ flex:1; overflow-y:auto; padding:8px 22px 80px; }
  #doc .wrap{ max-width:none; margin:0; }   /* 本文はウィンドウ幅いっぱい（行数を減らし実務での視認性を上げる。三根さん指示2026-06-17）*/
  .h{ font-weight:700; color:#bcd0f0; margin:20px 0 6px; }
  .h.lv1{ font-size:16px; } .h.lv2{ font-size:15px; } .h.lv3,.h.lv4,.h.lv5{ font-size:13px; color:#9fb4d6; }
  .art{ border-bottom:1px solid var(--line); padding:12px 4px; content-visibility:auto; contain-intrinsic-size:auto 240px; }  /* 画面外の条文は遅延描画（巨大法令を高速化） */
  .art .num{ font-weight:700; color:#7fb0ff; }
  .art .cap{ color:var(--muted); font-size:13px; margin-left:6px; }
  .art .body{ margin-top:6px; font-size:14px; line-height:1.85; white-space:pre-wrap; }
  .art.target{ background:rgba(46,108,240,.12); border-radius:8px; }
  mark{ background:var(--hi); color:#0b1220; border-radius:2px; padding:0 1px; }
  /* 規制動向パネル（逆引き）＋条文バッジ */
  .regpanel{ border:1px solid #2b66c0; background:#0e1a2e; border-radius:10px; padding:8px 12px; margin:4px 0 16px; }
  .regpanel>summary{ cursor:pointer; font-weight:700; color:#8fd0ff; font-size:14px; list-style:none; }
  .regpanel>summary::-webkit-details-marker{ display:none; }
  .regpanel>summary::before{ content:'▾ '; }
  .regpanel:not([open])>summary::before{ content:'▸ '; }
  .rrow{ display:flex; flex-wrap:wrap; align-items:baseline; gap:7px; padding:7px 2px; border-top:1px solid var(--line); font-size:13px; }
  .rrow:first-of-type{ margin-top:6px; }
  .rdate{ color:var(--muted); font-variant-numeric:tabular-nums; flex:none; }
  .rag{ color:#bcd0f0; font-size:11px; background:#16223a; border-radius:5px; padding:1px 6px; flex:none; }
  .rttl{ color:var(--fg); text-decoration:none; flex:1; min-width:200px; }
  .rttl:hover{ color:#7fb0ff; text-decoration:underline; }
  .rarts{ font-size:12px; color:var(--muted); flex-basis:100%; }
  .rarts .ra{ color:#8fd0ff; text-decoration:none; margin-right:8px; border-bottom:1px dotted #2b66c0; cursor:pointer; }
  .rmore{ font-size:12px; color:var(--muted); padding:8px 2px 2px; border-top:1px solid var(--line); }
  .rmore a, .rarts a{ color:#8fd0ff; }
  .rk{ font-size:10px; font-weight:700; padding:1px 6px; border-radius:5px; flex:none; background:#475569; color:#fff; }
  .rk.k-パブコメ{ background:#b45309; } .rk.k-改正{ background:#1d4ed8; } .rk.k-公布{ background:#15803d; }
  .rk.k-ガイドライン{ background:#7c3aed; } .rk.k-告示, .rk.k-通達等{ background:#475569; }
  .artreg{ display:inline-block; margin-left:8px; font-size:11px; font-weight:700; color:#fff; background:#b45309;
    border-radius:6px; padding:1px 7px; text-decoration:none; vertical-align:middle; }
  .artreg:hover{ filter:brightness(1.15); }
  /* カッコの入れ子の深さで背景色を変える */
  .body .p{ border-radius:3px; padding:0 1px; box-shadow:inset 0 0 0 1px rgba(255,255,255,.12); }
  /* 入れ子で背景が重なり濃く見えるため、各色の不透明度を約7割に下げる（2026-06-17三根さん指示）*/
  .body .p1{ background:rgba(37,99,235,.43); }    /* 青 */
  .body .p2{ background:rgba(202,77,8,.46); }     /* 橙 */
  .body .p3{ background:rgba(21,128,61,.43); }    /* 緑 */
  .body .p4{ background:rgba(147,51,234,.43); }   /* 紫 */
  .body .p5{ background:rgba(190,24,93,.45); }    /* 赤 */
  .body .p6{ background:rgba(13,148,136,.43); }   /* 青緑 */
  /* カッコの深さ別 折り畳み（「（…）」表示）。折り畳み規則は #doc[data-pd=N] でJS生成（高速） */
  .body .el{ display:none; opacity:.7; }
  #doc[data-pd] .p > .el{ opacity:.7; }
  /* カッコ深さ操作バー */
  #pctl{ margin-top:9px; display:flex; flex-wrap:wrap; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
  #pctl button{ background:#16223a; color:#cfe0ff; border:1px solid var(--line); border-radius:7px; padding:4px 9px; font-size:12px; cursor:pointer; }
  #pctl button:hover{ border-color:var(--accent); }
  #pctl-state{ color:#9fd0ff; font-weight:700; }
  /* 本文中の法令参照リンク（法第N条…） */
  .body a.rf{ color:inherit; text-decoration:none; cursor:pointer; border-bottom:1px dashed rgba(127,176,255,.55); }
  .body a.rf:hover{ color:#cfe7ff; border-bottom-color:#7fb0ff; background:rgba(127,176,255,.18); border-radius:2px; }
  /* 法令中の表（読替表等） */
  .body .lawtbl{ border-collapse:collapse; margin:10px 0; width:100%; white-space:normal; }
  .body .lawtbl th, .body .lawtbl td{ border:1px solid #3a4a66; padding:6px 9px; vertical-align:top; text-align:left; font-size:13px; line-height:1.7; white-space:pre-wrap; }
  .body .lawtbl th{ background:#16223a; color:#cfe0ff; font-weight:700; white-space:nowrap; }
  .body .lawtbl tr:nth-child(even) td{ background:rgba(255,255,255,.03); }
  .body .pa{ scroll-margin-top:70px; }                                  /* 項アンカー（行頭の項番号） */
  .body .pa.hit{ background:rgba(255,210,80,.9); color:#1a1a1a; border-radius:3px; padding:0 3px; }  /* ジャンプ先の項を強調 */
  .hint{ color:var(--muted); text-align:center; margin-top:60px; font-size:14px; line-height:1.8; }
  .hidden{ display:none; }

  @media(max-width:760px){
    #side{ position:fixed; z-index:20; height:100%; left:0; top:0; transform:translateX(-105%); transition:transform .25s; box-shadow:0 0 40px rgba(0,0,0,.6); }
    #side.open{ transform:translateX(0); }
    #burger{ display:inline-block; background:#16223a; color:#cfe0ff; border:1px solid var(--line); border-radius:8px; padding:6px 11px; font-size:16px; cursor:pointer; margin-bottom:8px; }
  }
</style>
</head>
<body>
<div id="app">
  <nav id="side">
    <h1 id="brand" title="トップ（法令選択／全文検索）へ">⚖️ finoject 法令ビューア</h1>
    <p class="sub">資金決済・犯収法・金商法 ／ e-Gov法令API v2</p>
    <a id="toReg" href="https://finoject.github.io/finoject-reg-monitor/" target="_blank" rel="noopener">📡 金融規制ウォッチ ↗</a>
    <div id="lawList"></div>
  </nav>

  <div id="main">
    <div id="top">
      <div class="topbtns">
        <button id="burger">☰ 法令一覧</button>
        <button id="home">🏠 トップ（法令選択／全文検索）</button>
      </div>
      <input id="gsearch" placeholder="🔍 全法令・ガイドラインを横断検索…（例：暗号資産、本人確認、収納代行）">
      <h2 id="lawTitle">法令を選択してください</h2>
      <p id="lawMeta"></p>
      <input id="search" placeholder="📄 この法令内だけをキーワード検索…（例：暗号資産、本人確認、登録）" class="hidden">
      <div id="pctl" class="hidden">
        <span>（ ）の表示:</span>
        <button data-pa="all">全部</button>
        <button data-pa="less">－ 深い所から隠す</button>
        <button data-pa="more">＋ 戻す</button>
        <button data-pa="skel">基本構造のみ</button>
        <span id="pctl-state"></span>
      </div>
    </div>
    <div id="doc"><div class="wrap"><div class="hint">
      左の一覧から法令を選ぶと、条文が表示されます。<br>
      条文内はキーワード検索でき、各条はe-Govの原文ともつながっています。<br>
      （毎朝07:30に自動更新。改正があった法令には <span style="background:#fbbf24;color:#0b1220;border-radius:4px;padding:0 5px;">更新</span> が付きます）
    </div></div></div>
  </div>
</div>

<script>
const G_ORDER = ['金商法','資金決済','犯収法','銀行法','会社法','個人情報','ガイドライン'];
// サイドバーのグループ見出しの表示名（内部キーG_ORDER/groupは変更しない＝LAW_OF等に影響させない）
const GLABEL = { '金商法':'金商法関連','資金決済':'資金決済法関連','犯収法':'犯収法関連','銀行法':'銀行法関連','会社法':'会社法関連','個人情報':'個人情報保護法関連','ガイドライン':'各種ガイドライン' };
// 各府令・施行令・ガイドラインの本文中「法」が指す親法令（law_id）。新規追加時はここに対応を足す。
const LAW_OF = {
  '422CO0000000019':'421AC0000000059', '429M60000002007':'421AC0000000059', '422M60000002004':'421AC0000000059',
  '422M60000002003':'421AC0000000059', '505M60000002048':'421AC0000000059',
  '420CO0000000020':'419AC0000000022', '420M60000F5A001':'419AC0000000022',
  '340CO0000000321':'323AC0000000025', '419M60000002052':'323AC0000000025',
  '357CO0000000040':'356AC0000000059', '357M50000040010':'356AC0000000059',                     // 銀行法系→銀行法
  '417CO0000000364':'417AC0000000086', '418M60000010012':'417AC0000000086',                     // 会社法系→会社法
  '418M60000010013':'417AC0000000086', '418M60000010014':'417AC0000000086',
  '415CO0000000507':'415AC0000000057', '428M60020000003':'415AC0000000057',                     // 個人情報系→個人情報保護法
  'fsa-guide-16':'421AC0000000059', 'fsa-guide-14':'421AC0000000059',
  'fsa-guide-05':'421AC0000000059', 'fsa-guide-17':'421AC0000000059',
  'fsa-kantoku-city':'356AC0000000059', 'fsa-kantoku-chusho':'356AC0000000059',  // 銀行監督指針→銀行法
  'fsa-kantoku-kinsho':'323AC0000000025',                                        // 金商業者監督指針→金商法
};
let INDEX=null, CUR=null, cache={}, REF=null, REFTITLE='', ARTSET=new Set(), RPC=[], curMaxDepth=0;
// ===== 金融規制ウォッチ連携（逆引き：この法令に関する最近の規制動向を条文に重ねる）=====
const REG_URL = 'https://finoject.github.io/finoject-reg-monitor/data.json';
const REG_SITE = 'https://finoject.github.io/finoject-reg-monitor/';
let REGBYLAW={}, REGBYART={}, REGLOADED=false;
async function loadRegNews(){
  if (REGLOADED) return;
  REGLOADED = true;
  try {
    const d = await (await fetch(REG_URL + '?t=' + Date.now())).json();
    for (const it of (d.items||[])){
      for (const r of (it.lawrefs||[])){
        (REGBYLAW[r.id] = REGBYLAW[r.id] || []).push({ it, kind:r.kind, art:r.art });
        if (r.art){ const key = r.id+'|'+r.art; (REGBYART[key] = REGBYART[key] || []).push({ it, kind:r.kind }); }
      }
    }
    // 各法令の動向は日付降順
    for (const id in REGBYLAW) REGBYLAW[id].sort((a,b)=> (b.it.date||'').localeCompare(a.it.date||''));
    // 既に法令を開いていれば再描画してパネル/バッジを反映（ディープリンク時の取得遅延に対応）
    const sv = document.querySelector('#search');
    if (CUR && !(sv && sv.value)) renderDoc('');
  } catch(e){ /* 取得失敗時は連携なしで通常表示 */ }
}

const $ = s => document.querySelector(s);
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function boot(){
  INDEX = await (await fetch('./data/index.json?t='+Date.now())).json();
  loadRegNews();               // 規制動向は裏で読み込み（失敗しても本体表示は継続）
  renderSidebar();
  // ディープリンク: ?law=ID&art=第九条
  const q = new URLSearchParams(location.search);
  const law = q.get('law'); const art = q.get('art'); const para = q.get('para');
  if (law) await openLaw(law, art, para);
  else showHome();
}

function renderSidebar(){
  const byG = {};
  for (const l of INDEX.laws){ (byG[l.group]=byG[l.group]||[]).push(l); }
  let html='';
  // 既定順のグループ＋未知グループ（会社法・民法等を追加しても自動表示）
  const groups = [...G_ORDER, ...Object.keys(byG).filter(g => !G_ORDER.includes(g))];
  for (const g of groups){
    if(!byG[g]) continue;
    html += `<div class="grp">${esc(GLABEL[g]||g)}</div>`;
    for (const l of byG[g]){
      const upd = (INDEX.changed||[]).includes(l.title) ? '<span class="upd">更新</span>' : '';
      html += `<button class="law" data-id="${l.law_id}">
        <div>${esc(l.title)}${upd}</div>
        <div class="tag">${l.type}・${l.law_num}・${l.article_count}条</div></button>`;
    }
  }
  const el = $('#lawList'); el.innerHTML = html;
  el.querySelectorAll('.law').forEach(b => b.addEventListener('click', ()=> openLaw(b.dataset.id)));
}

async function loadLaw(id){
  if (cache[id]) return cache[id];
  const d = await (await fetch(`./data/${id}.json?t=`+Date.now())).json();
  cache[id] = d; return d;
}

async function openLaw(id, artNum, para){
  const d = await loadLaw(id);
  CUR = d;
  REF = LAW_OF[d.law_id] || null;                                   // この文書の「法」が指す親法令
  REFTITLE = REF ? ((INDEX.laws.find(l => l.law_id === REF)||{}).title || '') : '';
  ARTSET = new Set((d.blocks||[]).filter(b => b.num).map(b => b.num));  // 自文書に実在する条番号（自リンクの可否判定用）
  document.querySelectorAll('.law').forEach(b => b.classList.toggle('active', b.dataset.id===id));
  $('#lawTitle').textContent = d.title;
  const updated = (d.updated||'').slice(0,10);
  $('#lawMeta').innerHTML = `${d.type}・${esc(d.law_num)}　|　施行/更新: ${updated||'—'}　|　`
    + `<a href="${d.egov_url}" target="_blank" rel="noopener">e-Govで原文を見る ↗</a>`;
  const s = $('#search'); s.classList.remove('hidden'); s.value='';
  $('#pctl').classList.remove('hidden');
  renderDoc('');
  $('#side').classList.remove('open');
  // 条文ジャンプ（大きな法令の描画完了を待ってリトライ）
  if (artNum){
    const dec = decodeURIComponent(artNum);
    let tries = 0;
    const scrollTo = () => {
      const t = [...document.querySelectorAll('.art')].find(a => a.dataset.num === dec);
      if (!t) return false;
      t.classList.add('target');
      const pa = para && document.getElementById(dec + ':p' + para);
      if (pa){ pa.classList.add('hit'); pa.scrollIntoView({block:'center'}); } else { t.scrollIntoView({block:'start'}); }
      return true;
    };
    const jump = () => {
      if (scrollTo()){
        // content-visibilityで画面外条文が後から実寸描画され位置がずれるため、数回 再スクロールして補正
        setTimeout(scrollTo, 250); setTimeout(scrollTo, 700);
      } else if (++tries < 25) setTimeout(jump, 100);
    };
    setTimeout(jump, 50);
  } else { $('#doc').scrollTop = 0; }
}

// 本文を1パスで処理（エスケープ後・制御文字不要）:
//  ① 検索語ハイライト ② カッコ（）の入れ子の深さで背景色分け（番号・記号だけのカッコは除外）
//  ③ 条文参照リンク … 「法第N条…」→この文書の親法令、「第N条…」（法/名称法を伴わない）→この文書自身。
//     直前が漢字・閉じカッコの場合は対象外（民法・○○法第N条 や （…号）第N条 の誤リンクを防ぐ）。
function render(raw, k, artNum){
  const text = esc(raw), kk = k ? esc(k) : '';
  const MARKER = /[（(](?:[0-9０-９一二三四五六七八九十百千〇]+|[ぁ-んァ-ヶa-zA-Zａ-ｚＡ-Ｚ]|注[0-9０-９]*|参考[0-9０-９]*|別[紙表添][0-9０-９]*)[）)]/y;  // 番号・記号・ラベル（注/参考/別紙等）のみのカッコは色付けしない
  const REFJO  = /(法)?第\d+条(?:の\d+)?(?:第\d+項)?(?:第\d+号(?:の\d+)?)?/y;    // 条参照（条あり）
  const REFKO  = /第\d+項(?:第\d+号(?:の\d+)?)?(?:各号)?/y;                       // 項参照（条を含まない＝自条内）
  const PARANUM = /\d+(?=[ 　])/y;                                              // 行頭の項番号（数字＋空白）
  const myId = CUR && CUR.law_id, myTitle = (CUR && CUR.title) || '';
  const aid = artNum || '';
  // 第1項アンカー（本文先頭。第1項は番号が無いため空アンカー）
  let out = aid ? '<span class="pa" id="'+esc(aid)+':p1"></span>' : '';
  let depth=0, i=0;
  while (i < text.length){
    const bol = (i===0) || (text[i-1]==='\n');
    // 主要な列挙項目（①〜⑳ / ⑴〜⒇）の前は1行空けて視認性を上げる（細かいイロハ・号は空けない）
    if (bol && i>0 && /[①-⑳⑴-⒇]/.test(text[i])) out += '\n';
    // 行頭の項番号 → 番号を項アンカーで包む（号/イロハは字下げ＝先頭が空白なので該当しない）
    if (bol && aid && /[0-9]/.test(text[i])){
      PARANUM.lastIndex = i; const pm = PARANUM.exec(text);
      if (pm && pm.index === i){ out += '<span class="pa" id="'+esc(aid)+':p'+pm[0]+'">'+pm[0]+'</span>'; i += pm[0].length; continue; }
    }
    if (kk && text.startsWith(kk, i)){ out += '<mark>'+kk+'</mark>'; i += kk.length; continue; }
    const ch = text[i];
    if ((ch==='法' || ch==='第') && !/[一-鿿々）)]/.test(text[i-1] || '')){   // 直前が漢字/閉じカッコなら誤リンク回避
      REFJO.lastIndex = i; const m = REFJO.exec(text);
      if (m && m.index === i){
        const isHou = !!m[1];
        const tid = isHou ? REF : myId;                                    // 法あり→親法令／法なし→自文書
        const art = m[0].match(/第\d+条(?:の\d+)?/)[0];
        // 法あり=親法令へ（常時）。法なし=自文書だが、自文書に実在する条のときだけ（他法引用文中の第N条を誤リンクしない）
        if (tid && (isHou || ARTSET.has(art))){
          const ttl = isHou ? REFTITLE : myTitle;
          out += '<a class="rf" href="?law='+tid+'&art='+encodeURIComponent(art)+'" target="_blank" rel="noopener" title="'+esc(ttl)+' '+art+' を新しいタブで開く（右クリックで新規タブ/ウィンドウを選択）">'+m[0]+'</a>';
          i += m[0].length; continue;
        }
      }
      // 条を含まない項参照（第N項…）→ この条文内の該当項へジャンプ
      if (ch==='第' && aid){
        REFKO.lastIndex = i; const m2 = REFKO.exec(text);
        if (m2 && m2.index === i){
          const pn = m2[0].match(/第(\d+)項/)[1];
          out += '<a class="rf" href="?law='+myId+'&art='+encodeURIComponent(aid)+'&para='+pn+'" target="_blank" rel="noopener" title="'+esc(aid)+'第'+pn+'項を新しいタブで開く（右クリックで新規タブ/ウィンドウを選択）">'+m2[0]+'</a>';
          i += m2[0].length; continue;
        }
      }
    }
    if (ch==='（' || ch==='('){
      MARKER.lastIndex = i; const mk = MARKER.exec(text);
      if (mk && mk.index === i){ out += mk[0]; i += mk[0].length; continue; }   // 番号カッコは無色のまま
      depth++; RPC[depth]=(RPC[depth]||0)+1; out += '<span class="p p'+((depth-1)%6+1)+'" data-d="'+depth+'">' + ch + '<span class="pz">';  // pz=内側（折り畳み対象）、RPC=深さ別カウント
    }
    else if ((ch==='）' || ch===')') && depth>0){ out += '</span><i class="el">…</i>' + ch + '</span>'; depth--; }  // el=省略時の「…」
    else if (ch==='。'){ out += '。'; const nx=text[i+1]; if (depth===0 && nx && nx!=='\n' && !/[」』）)】］〕]/.test(nx)) out += '\n'; }  // 文ごとに改行（カッコ内の文・閉じ括弧/鉤括弧の直前では改行しない）
    else out += ch;
    i++;
  }
  while (depth-- > 0) out += '</span></span>';   // 未閉じカッコ: pz と p を閉じる
  return out;
}
// 表データを本物のHTMLテーブルに（e-Govの構造を忠実再現）。セルも render() で整形（カッコ色分け・条文リンク）
// e-Govの結合は2方式: ①rowspan/colspan属性（継続行は被覆列を省略）②罫線(空セル+BorderTop:none)。両方に対応
function tableHtml(table, k){
  let rows = (table && table.rows) ? table.rows : (table || []);
  // 読替表なら置換前/置換後の意味を示す列見出しを補う。判定は ①yomikaeフラグ or ②第1列が条項参照中心（語句に依存しない）
  if (table && rows.length){
    const f0 = (rows[0].cells && rows[0].cells[0] && rows[0].cells[0].t) || '';
    const hasHeader = rows[0].header || /読(み)?替|規定|字句|上欄|中欄|下欄/.test(f0);
    const col1 = rows.filter(r=>!r.header).map(r=>(r.cells && r.cells[0] && r.cells[0].t) || '').filter(Boolean);
    const refLike = col1.filter(t=>/^(第\d+(条|項|号)|附則|前[条項]|同[条項表項])/.test(t)).length;
    const isYomikae = (table && table.yomikae) || (col1.length>=3 && refLike >= Math.ceil(col1.length*0.5));
    if (isYomikae && !hasHeader){
      const nc = rows.reduce((m,r)=>Math.max(m,(r.cells||[]).reduce((a,c)=>a+(c.cs||1),0)),0);
      const labels = nc>=3 ? ['読み替える規定','読み替えられる字句','読み替える字句'] : ['読み替えられる字句','読み替える字句'];
      const hc = []; for (let i=0;i<Math.min(nc,labels.length);i++) hc.push({ t:labels[i], rs:1, cs:1 });
      rows = [{ header:true, cells:hc }].concat(rows);
    }
  }
  const n = rows.length;
  const cellHtml = (c, tg) => {
    const rs = (c && c.rs>1) ? ' rowspan="'+c.rs+'"' : '';
    const cs = (c && c.cs>1) ? ' colspan="'+c.cs+'"' : '';
    return '<'+tg+rs+cs+'>' + render((c && c.t) || '', k) + '</'+tg+'>';
  };
  const hasAttrSpan = rows.some(r => (r.cells||[]).some(c => (c.rs>1) || (c.cs>1)));
  let h = '<table class="lawtbl">';
  if (hasAttrSpan){
    // ①rowspan/colspan属性方式：各行のセルを属性付きでそのまま描画（被覆列は元から省略されている）
    for (const r of rows){
      const tg = r.header ? 'th' : 'td';
      h += '<tr>';
      for (const c of (r.cells||[])) h += cellHtml(c, tg);
      h += '</tr>';
    }
  } else {
    // ②罫線方式：空セル＋ct(BorderTop:none)を上のセルにrowspan統合し、空の継続セルを出さない
    const span = rows.map(r => (r.cells||[]).map(()=>1));
    const skip = rows.map(r => (r.cells||[]).map(()=>false));
    for (let i=1;i<n;i++){
      const cells = rows[i].cells||[];
      for (let ci=0; ci<cells.length; ci++){
        if (cells[ci] && cells[ci].ct){
          let j=i-1; while (j>=0 && (skip[j]||[])[ci]) j--;
          if (j>=0 && rows[j].cells && rows[j].cells[ci]!==undefined){ span[j][ci]++; skip[i][ci]=true; }
        }
      }
    }
    for (let i=0;i<n;i++){
      const r = rows[i], tg = r.header ? 'th' : 'td', cells = r.cells||[];
      h += '<tr>';
      for (let ci=0; ci<cells.length; ci++){
        if (skip[i][ci]) continue;
        const rs = span[i][ci] > 1 ? ' rowspan="'+span[i][ci]+'"' : '';
        h += '<'+tg+rs+'>' + render((cells[ci] && cells[ci].t) || '', k) + '</'+tg+'>';
      }
      h += '</tr>';
    }
  }
  return h + '</table>';
}
// 検索対象テキスト（本文＋表セルも含める。本文の占位子は除く）
function searchText(b){
  let s = b.num + ' ' + (b.cap||'') + ' ' + (b.body||'').replace(/⟦TBL:\d+⟧/g,'');
  if (b.tables){ for (const tbl of b.tables){ const rows=(tbl&&tbl.rows)?tbl.rows:tbl; for (const row of rows) for (const c of (row.cells||[])) s += ' ' + (c && c.t || ''); } }
  return s;
}
// 「2個以上存在する最深レベル」を実効最大深さとする（全法令で1個だけの極端に深い外れ値を初回ステップに畳み込み、初回クリックが必ず効くように）
function effMaxDepth(rpc){
  let absMax=0; for (let d=1; d<rpc.length; d++) if (rpc[d]) absMax=d;
  for (let d=absMax; d>=1; d--) if ((rpc[d]||0) >= 2) return d;
  return absMax;   // すべて1個以下なら絶対最大
}
// ===== 規制動向の重ね表示（逆引きパネル＋条文バッジ）=====
function jpd(iso){ if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${y}.${+m}.${+d}`; }
function regKindTag(kind){ return (!kind||kind==='その他') ? '' : `<span class="rk k-${kind}">${esc(kind)}</span>`; }
function jumpArt(num){ const t=[...document.querySelectorAll('.art')].find(a=>a.dataset.num===num); if(t){ t.classList.add('target'); t.scrollIntoView({block:'start'}); } }
function regPanelHtml(lawId){
  const list = REGBYLAW[lawId]; if(!list || !list.length) return '';
  const byUrl = new Map();                                   // 同一ニュースが複数条にまたがる→URLで集約
  for(const e of list){ const u=e.it.url; if(!byUrl.has(u)) byUrl.set(u,{it:e.it, kinds:new Set(), arts:new Set()});
    const g=byUrl.get(u); if(e.kind)g.kinds.add(e.kind); if(e.art)g.arts.add(e.art); }
  const rows=[...byUrl.values()].sort((a,b)=>(b.it.date||'').localeCompare(a.it.date||''));
  const SHOWN=12;
  const items = rows.slice(0,SHOWN).map(g=>{
    const arts=[...g.arts].map(a=>`<a class="ra" href="#" onclick="jumpArt('${a}');return false;" title="${esc(a)}へ移動">${esc(a)}</a>`).join('');
    const kinds=[...g.kinds].map(regKindTag).join('');
    return `<div class="rrow"><span class="rdate">${jpd(g.it.date)}</span><span class="rag">${esc(g.it.agency||'')}</span>${kinds}`
      + `<a class="rttl" href="${esc(g.it.url)}" target="_blank" rel="noopener">${esc(g.it.title)}</a>`
      + (arts?`<span class="rarts">該当条文: ${arts}</span>`:'') + `</div>`;
  }).join('');
  const more = rows.length>SHOWN
    ? `<div class="rmore">ほか ${rows.length-SHOWN} 件 — <a href="${REG_SITE}" target="_blank" rel="noopener">金融規制ウォッチで全件見る ↗</a></div>`
    : `<div class="rmore"><a href="${REG_SITE}" target="_blank" rel="noopener">金融規制ウォッチ（新着監視）↗</a></div>`;
  return `<details class="regpanel" open><summary>📡 この法令に関する最近の規制動向（${rows.length}件）</summary>${items}${more}</details>`;
}
function regArtBadge(lawId, num){
  const e = REGBYART[lawId+'|'+num]; if(!e||!e.length) return '';
  const kinds=[...new Set(e.map(x=>x.kind))].filter(k=>k&&k!=='その他');
  const tip = e.map(x=>jpd(x.it.date)+' '+(x.kind||'')).join(' / ');
  return `<a class="artreg" href="${esc(e[0].it.url)}" target="_blank" rel="noopener" title="金融規制ウォッチで開く（右クリックで新規タブ/ウィンドウを選択）｜${esc(tip)}">📡 規制動向${kinds.length?'（'+esc(kinds.join('・'))+'）':''}</a>`;
}
function renderDoc(kw){
  const k = (kw||'').trim();
  let html=''; RPC=[];
  const badgedNums = new Set();   // 条番号は法令内で一意でない（附則等で重複）→規制動向バッジは本則（最初の出現）のみ
  for (const b of CUR.blocks){
    if (b.t==='h'){ html += `<div class="h lv${b.lv}">${esc(b.x)}</div>`; }
    else {
      if (k && !searchText(b).includes(k)) continue;          // 検索ヒットのみ表示（表セルも対象）
      let body = render(b.body, k, b.num);
      if (b.tables) body = body.replace(/⟦TBL:(\d+)⟧/g, (m,i) => b.tables[+i] ? tableHtml(b.tables[+i], k) : '');
      const cap  = b.cap ? `<span class="cap">${esc(b.cap)}</span>` : '';
      let rbadge = '';
      if (CUR && b.num && !badgedNums.has(b.num)){ rbadge = regArtBadge(CUR.law_id, b.num); if (rbadge) badgedNums.add(b.num); }
      html += `<div class="art" data-num="${esc(b.num)}"><span class="num">${esc(b.num)}</span>${cap}${rbadge}<div class="body">${body}</div></div>`;
    }
  }
  if (k && !/class="art"/.test(html)) html = `<div class="hint">「${esc(k)}」に一致する条文はありません</div>`;
  const panel = (CUR && !k) ? regPanelHtml(CUR.law_id) : '';   // 検索中以外は冒頭に規制動向パネル
  $('#doc').innerHTML = `<div class="wrap">${panel}${html}</div>`;
  curMaxDepth = effMaxDepth(RPC);   // この描画での実効最大カッコ深さ（applyParenが使用）
  applyParen();          // カッコ折り畳み状態を再適用（CSSクラス1発）
}

// 本文中の法令参照リンクのクリック → 即時リロードせずアプリ内ジャンプ（ホバーでリンク表示・クリックで移動）
// 本文中の参照リンク(a.rf)は target="_blank" の実リンク＝新しいタブで開く。
// 左クリック=新タブ（現在地を保持）、右クリック=ブラウザ標準の「新しいタブ/ウィンドウで開く」。JSでの横取りはしない。
let _stimer=null;
$('#search').addEventListener('input', e => { const v=e.target.value; clearTimeout(_stimer); _stimer=setTimeout(()=>renderDoc(v), 200); });   // デバウンス（巨大法令で連打再描画を防ぐ）

// ===== 全法令・ガイドライン横断検索 =====
let ALL_LOADED = false;
async function loadAll(){
  if (ALL_LOADED) return;
  await Promise.all(INDEX.laws.map(l => loadLaw(l.law_id).catch(()=>null)));
  ALL_LOADED = true;
}
function orderedLaws(){
  const byG = {}; for (const l of INDEX.laws) (byG[l.group]=byG[l.group]||[]).push(l);
  const groups = [...G_ORDER, ...Object.keys(byG).filter(g => !G_ORDER.includes(g))];
  const out = []; for (const g of groups){ if (byG[g]) out.push(...byG[g]); } return out;
}
function gSnippet(body, q){
  const i = (body||'').indexOf(q); if (i<0) return '';
  const s = Math.max(0,i-28), e = Math.min(body.length, i+q.length+60);
  const t = (s>0?'…':'') + body.slice(s,e).replace(/\n/g,' ') + (e<body.length?'…':'');
  return esc(t).split(esc(q)).join('<mark>'+esc(q)+'</mark>');
}
function showHome(){
  $('#doc').innerHTML = `<div class="wrap"><div class="hint">
    上の検索窓で<b>全法令・ガイドラインを横断検索</b>できます（結果は下に全件表示）。<br>
    または左の一覧から法令を選ぶと条文が表示されます。<br>
    （毎朝自動更新。改正があった法令には <span style="background:#fbbf24;color:#0b1220;border-radius:4px;padding:0 5px;">更新</span> が付きます）
  </div></div>`;
}
let gseq = 0;
async function globalSearch(q){
  q = (q||'').trim();
  if (!q){ CUR ? renderDoc('') : showHome(); return; }
  const my = ++gseq;
  $('#doc').innerHTML = '<div class="wrap"><div class="hint">全法令・ガイドラインを検索中…</div></div>';
  await loadAll();
  if (my !== gseq) return;                         // 後続の入力があれば破棄
  let html = '', total = 0;
  for (const l of orderedLaws()){
    const d = cache[l.law_id]; if (!d) continue;
    const hits = d.blocks.filter(b => b.t!=='h' && searchText(b).includes(q));
    if (!hits.length) continue;
    html += `<div class="gsec">${esc(l.title)} <span>(${hits.length}件)</span></div>`;
    for (const b of hits){
      total++;
      html += `<a class="ghit" href="?law=${l.law_id}&art=${encodeURIComponent(b.num)}" target="_blank" rel="noopener">`
        + `<span class="gnum">${esc(b.num)}</span><span class="gcap">${esc(b.cap||'')}</span>`
        + `<span class="gsnip">${gSnippet(b.body,q)}</span></a>`;
    }
  }
  $('#doc').innerHTML = `<div class="wrap"><div class="gres-head">「${esc(q)}」の横断検索結果：${total}件</div>`
    + (html || '<div class="hint">該当する条文・項目はありません</div>') + '</div>';
}
let gtimer = null;
$('#gsearch').addEventListener('input', e => { const v = e.target.value; clearTimeout(gtimer); gtimer = setTimeout(()=>globalSearch(v), 220); });

// トップ（法令選択／全文検索）へ戻る
function goHome(){
  CUR = null;
  history.pushState(null, '', location.pathname);
  document.querySelectorAll('.law.active').forEach(b => b.classList.remove('active'));
  $('#lawTitle').textContent = '法令を選択してください';
  $('#lawMeta').innerHTML = '';
  const s = $('#search'); s.classList.add('hidden'); s.value = '';
  $('#pctl').classList.add('hidden');
  $('#gsearch').value = '';
  $('#side').classList.remove('open');
  showHome();
  $('#doc').scrollTop = 0;
}
$('#home').addEventListener('click', goHome);
$('#brand').addEventListener('click', goHome);   // 左上タイトルもトップへ

// ===== カッコの深さ別 折り畳み（クリックで深度を変化）=====
let pDepth = 99;   // 深さが pDepth 以上の（）を「（…）」に折り畳む（99=全表示）
// 折り畳みは #doc[data-pd=N] のCSS規則で一括制御（全span走査をしないので巨大法令でも高速）。深さ規則を生成
(function buildParenCSS(){
  const MAXD = 14; let css = '';
  for (let pd=1; pd<=MAXD; pd++){
    const hide=[], show=[];
    for (let d=pd; d<=MAXD; d++){ hide.push('#doc[data-pd="'+pd+'"] .p[data-d="'+d+'"]>.pz'); show.push('#doc[data-pd="'+pd+'"] .p[data-d="'+d+'"]>.el'); }
    css += hide.join(',')+'{display:none}\n' + show.join(',')+'{display:inline}\n';
  }
  const st=document.createElement('style'); st.textContent=css; document.head.appendChild(st);
})();
function applyParen(){
  const doc=$('#doc'), mx=curMaxDepth;
  if (pDepth > mx) doc.removeAttribute('data-pd'); else doc.setAttribute('data-pd', pDepth);   // クラス1発（全走査なし）
  const st = $('#pctl-state');
  if (st) st.textContent = '［状態: ' + ((pDepth > mx) ? '全部表示' : (pDepth <= 1 ? '基本構造（カッコ省略）' : ('深さ '+(pDepth-1)+' まで'))) + '］';
}
$('#pctl').addEventListener('click', e => {
  const a = e.target.getAttribute('data-pa'); if (!a) return;
  const mx = curMaxDepth;
  if (a==='all') pDepth = mx + 1;
  else if (a==='skel') pDepth = 1;
  else if (a==='less') pDepth = Math.max(1, (pDepth > mx ? mx + 1 : pDepth) - 1);
  else if (a==='more') pDepth = Math.min(mx + 1, pDepth + 1);
  applyParen();
});
$('#burger').addEventListener('click', ()=> $('#side').classList.toggle('open'));

boot().catch(e => { $('#doc').innerHTML = '<div class="wrap"><div class="hint">データの読み込みに失敗しました</div></div>'; });
</script>
