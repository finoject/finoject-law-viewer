<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>finoject 法令ビューア｜資金決済・犯収法・金商法</title>
<style>
  :root{ --bg:#0b1220; --panel:#111a2c; --line:#26334d; --fg:#e8eefb; --muted:#8da3c6; --accent:#2e6cf0; --hi:#fde68a; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:"Segoe UI","Hiragino Sans","Meiryo",sans-serif; -webkit-text-size-adjust:100%; }
  #app{ display:flex; height:100vh; overflow:hidden; }

  /* サイドバー */
  #side{ width:300px; flex:none; background:var(--panel); border-right:1px solid var(--line);
    overflow-y:auto; padding:12px; }
  #side h1{ font-size:15px; margin:2px 4px 2px; }
  #side .sub{ font-size:11px; color:var(--muted); margin:0 4px 8px; }
  #toReg{ display:inline-block; font-size:12px; color:#9fd0ff; text-decoration:none; margin:0 4px 10px;
    padding:5px 10px; border:1px solid #2b66c0; border-radius:8px; background:#13243f; }
  #toReg:hover{ background:#1c3a63; }
  .grp{ font-size:11px; color:var(--muted); margin:14px 6px 6px; letter-spacing:.04em; border-left:3px solid var(--accent); padding-left:8px; }
  .law{ display:block; width:100%; text-align:left; cursor:pointer; border:1px solid var(--line);
    background:#16223a; color:#cfe0ff; border-radius:8px; padding:9px 10px; margin:6px 0; font-size:13px; line-height:1.4; }
  .law:hover{ border-color:var(--accent); }
  .law.active{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .law .tag{ font-size:10px; color:var(--muted); }
  .law.active .tag{ color:#dbe8ff; }
  .law .upd{ display:inline-block; font-size:10px; background:#fbbf24; color:#0b1220; border-radius:4px; padding:0 5px; margin-left:4px; }

  /* 本体 */
  #main{ flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #top{ flex:none; background:rgba(11,18,32,.96); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:12px 18px; }
  #burger{ display:none; }
  #lawTitle{ font-size:17px; font-weight:700; margin:0; }
  #lawMeta{ font-size:11px; color:var(--muted); margin:3px 0 0; }
  #lawMeta a{ color:#7fb0ff; }
  #search{ margin-top:9px; width:100%; max-width:520px; padding:8px 11px; border-radius:8px; border:1px solid var(--line);
    background:#0e1626; color:var(--fg); font-size:13px; }
  #doc{ flex:1; overflow-y:auto; padding:8px 22px 80px; }
  #doc .wrap{ max-width:860px; margin:0 auto; }
  .h{ font-weight:700; color:#bcd0f0; margin:20px 0 6px; }
  .h.lv1{ font-size:16px; } .h.lv2{ font-size:15px; } .h.lv3,.h.lv4,.h.lv5{ font-size:13px; color:#9fb4d6; }
  .art{ border-bottom:1px solid var(--line); padding:12px 4px; }
  .art .num{ font-weight:700; color:#7fb0ff; }
  .art .cap{ color:var(--muted); font-size:13px; margin-left:6px; }
  .art .body{ margin-top:6px; font-size:14px; line-height:1.85; white-space:pre-wrap; }
  .art.target{ background:rgba(46,108,240,.12); border-radius:8px; }
  mark{ background:var(--hi); color:#0b1220; border-radius:2px; padding:0 1px; }
  /* カッコの入れ子の深さで背景色を変える */
  .body .p{ border-radius:3px; padding:0 1px; box-shadow:inset 0 0 0 1px rgba(255,255,255,.12); }
  .body .p1{ background:rgba(37,99,235,.62); }    /* 青 */
  .body .p2{ background:rgba(202,77,8,.66); }     /* 橙 */
  .body .p3{ background:rgba(21,128,61,.62); }    /* 緑 */
  .body .p4{ background:rgba(147,51,234,.62); }   /* 紫 */
  .body .p5{ background:rgba(190,24,93,.64); }    /* 赤 */
  .body .p6{ background:rgba(13,148,136,.62); }   /* 青緑 */
  /* 本文中の法令参照リンク（法第N条…） */
  .body a.rf{ color:inherit; text-decoration:none; cursor:pointer; border-bottom:1px dashed rgba(127,176,255,.55); }
  .body a.rf:hover{ color:#cfe7ff; border-bottom-color:#7fb0ff; background:rgba(127,176,255,.18); border-radius:2px; }
  .body .pa{ scroll-margin-top:70px; }                                  /* 項アンカー（行頭の項番号） */
  .body .pa.hit{ background:rgba(255,210,80,.9); color:#1a1a1a; border-radius:3px; padding:0 3px; }  /* ジャンプ先の項を強調 */
  .hint{ color:var(--muted); text-align:center; margin-top:60px; font-size:14px; line-height:1.8; }
  .hidden{ display:none; }

  @media(max-width:760px){
    #side{ position:fixed; z-index:20; height:100%; left:0; top:0; transform:translateX(-105%); transition:transform .25s; box-shadow:0 0 40px rgba(0,0,0,.6); }
    #side.open{ transform:translateX(0); }
    #burger{ display:inline-block; background:#16223a; color:#cfe0ff; border:1px solid var(--line); border-radius:8px; padding:6px 11px; font-size:16px; cursor:pointer; margin-bottom:8px; }
  }
</style>
</head>
<body>
<div id="app">
  <nav id="side">
    <h1>⚖️ finoject 法令ビューア</h1>
    <p class="sub">資金決済・犯収法・金商法 ／ e-Gov法令API v2</p>
    <a id="toReg" href="https://finoject.github.io/finoject-reg-monitor/" target="_blank" rel="noopener">📡 金融規制ウォッチ ↗</a>
    <div id="lawList"></div>
  </nav>

  <div id="main">
    <div id="top">
      <button id="burger">☰ 法令一覧</button>
      <h2 id="lawTitle">法令を選択してください</h2>
      <p id="lawMeta"></p>
      <input id="search" placeholder="この法令内をキーワード検索…（例：暗号資産、本人確認、登録）" class="hidden">
    </div>
    <div id="doc"><div class="wrap"><div class="hint">
      左の一覧から法令を選ぶと、条文が表示されます。<br>
      条文内はキーワード検索でき、各条はe-Govの原文ともつながっています。<br>
      （毎朝07:30に自動更新。改正があった法令には <span style="background:#fbbf24;color:#0b1220;border-radius:4px;padding:0 5px;">更新</span> が付きます）
    </div></div></div>
  </div>
</div>

<script>
const G_ORDER = ['資金決済','犯収法','金商法','ガイドライン'];
// 各府令・施行令・ガイドラインの本文中「法」が指す親法令（law_id）。新規追加時はここに対応を足す。
const LAW_OF = {
  '422CO0000000019':'421AC0000000059', '429M60000002007':'421AC0000000059', '422M60000002004':'421AC0000000059',
  '422M60000002003':'421AC0000000059', '505M60000002048':'421AC0000000059',
  '420CO0000000020':'419AC0000000022', '420M60000F5A001':'419AC0000000022',
  '340CO0000000321':'323AC0000000025', '419M60000002052':'323AC0000000025',
  'fsa-guide-16':'421AC0000000059', 'fsa-guide-14':'421AC0000000059',
  'fsa-guide-05':'421AC0000000059', 'fsa-guide-17':'421AC0000000059',
};
let INDEX=null, CUR=null, cache={}, REF=null, REFTITLE='', ARTSET=new Set();

const $ = s => document.querySelector(s);
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function boot(){
  INDEX = await (await fetch('./data/index.json?t='+Date.now())).json();
  renderSidebar();
  // ディープリンク: ?law=ID&art=第九条
  const q = new URLSearchParams(location.search);
  const law = q.get('law'); const art = q.get('art');
  if (law) await openLaw(law, art);
}

function renderSidebar(){
  const byG = {};
  for (const l of INDEX.laws){ (byG[l.group]=byG[l.group]||[]).push(l); }
  let html='';
  // 既定順のグループ＋未知グループ（会社法・民法等を追加しても自動表示）
  const groups = [...G_ORDER, ...Object.keys(byG).filter(g => !G_ORDER.includes(g))];
  for (const g of groups){
    if(!byG[g]) continue;
    html += `<div class="grp">${g}</div>`;
    for (const l of byG[g]){
      const upd = (INDEX.changed||[]).includes(l.title) ? '<span class="upd">更新</span>' : '';
      html += `<button class="law" data-id="${l.law_id}">
        <div>${esc(l.title)}${upd}</div>
        <div class="tag">${l.type}・${l.law_num}・${l.article_count}条</div></button>`;
    }
  }
  const el = $('#lawList'); el.innerHTML = html;
  el.querySelectorAll('.law').forEach(b => b.addEventListener('click', ()=> openLaw(b.dataset.id)));
}

async function loadLaw(id){
  if (cache[id]) return cache[id];
  const d = await (await fetch(`./data/${id}.json?t=`+Date.now())).json();
  cache[id] = d; return d;
}

async function openLaw(id, artNum){
  const d = await loadLaw(id);
  CUR = d;
  REF = LAW_OF[d.law_id] || null;                                   // この文書の「法」が指す親法令
  REFTITLE = REF ? ((INDEX.laws.find(l => l.law_id === REF)||{}).title || '') : '';
  ARTSET = new Set((d.blocks||[]).filter(b => b.num).map(b => b.num));  // 自文書に実在する条番号（自リンクの可否判定用）
  document.querySelectorAll('.law').forEach(b => b.classList.toggle('active', b.dataset.id===id));
  $('#lawTitle').textContent = d.title;
  const updated = (d.updated||'').slice(0,10);
  $('#lawMeta').innerHTML = `${d.type}・${esc(d.law_num)}　|　施行/更新: ${updated||'—'}　|　`
    + `<a href="${d.egov_url}" target="_blank" rel="noopener">e-Govで原文を見る ↗</a>`;
  const s = $('#search'); s.classList.remove('hidden'); s.value='';
  renderDoc('');
  $('#side').classList.remove('open');
  // 条文ジャンプ（大きな法令の描画完了を待ってリトライ）
  if (artNum){
    const dec = decodeURIComponent(artNum);
    let tries = 0;
    const jump = () => {
      const t = [...document.querySelectorAll('.art')].find(a => a.dataset.num === dec);
      if (t){ t.classList.add('target'); t.scrollIntoView({block:'start'}); }
      else if (++tries < 25) setTimeout(jump, 100);
    };
    setTimeout(jump, 50);
  } else { $('#doc').scrollTop = 0; }
}

// 本文を1パスで処理（エスケープ後・制御文字不要）:
//  ① 検索語ハイライト ② カッコ（）の入れ子の深さで背景色分け（番号・記号だけのカッコは除外）
//  ③ 条文参照リンク … 「法第N条…」→この文書の親法令、「第N条…」（法/名称法を伴わない）→この文書自身。
//     直前が漢字・閉じカッコの場合は対象外（民法・○○法第N条 や （…号）第N条 の誤リンクを防ぐ）。
function render(raw, k, artNum){
  const text = esc(raw), kk = k ? esc(k) : '';
  const MARKER = /[（(](?:[0-9０-９一二三四五六七八九十百千〇]+|[ぁ-んァ-ヶa-zA-Zａ-ｚＡ-Ｚ])[）)]/y;  // 番号・記号のみのカッコ
  const REFJO  = /(法)?第\d+条(?:の\d+)?(?:第\d+項)?(?:第\d+号(?:の\d+)?)?/y;    // 条参照（条あり）
  const REFKO  = /第\d+項(?:第\d+号(?:の\d+)?)?(?:各号)?/y;                       // 項参照（条を含まない＝自条内）
  const PARANUM = /\d+(?=[ 　])/y;                                              // 行頭の項番号（数字＋空白）
  const myId = CUR && CUR.law_id, myTitle = (CUR && CUR.title) || '';
  const aid = artNum || '';
  // 第1項アンカー（本文先頭。第1項は番号が無いため空アンカー）
  let out = aid ? '<span class="pa" id="'+esc(aid)+':p1"></span>' : '';
  let depth=0, i=0;
  while (i < text.length){
    const bol = (i===0) || (text[i-1]==='\n');
    // 行頭の項番号 → 番号を項アンカーで包む（号/イロハは字下げ＝先頭が空白なので該当しない）
    if (bol && aid && /[0-9]/.test(text[i])){
      PARANUM.lastIndex = i; const pm = PARANUM.exec(text);
      if (pm && pm.index === i){ out += '<span class="pa" id="'+esc(aid)+':p'+pm[0]+'">'+pm[0]+'</span>'; i += pm[0].length; continue; }
    }
    if (kk && text.startsWith(kk, i)){ out += '<mark>'+kk+'</mark>'; i += kk.length; continue; }
    const ch = text[i];
    if ((ch==='法' || ch==='第') && !/[一-鿿々）)]/.test(text[i-1] || '')){   // 直前が漢字/閉じカッコなら誤リンク回避
      REFJO.lastIndex = i; const m = REFJO.exec(text);
      if (m && m.index === i){
        const isHou = !!m[1];
        const tid = isHou ? REF : myId;                                    // 法あり→親法令／法なし→自文書
        const art = m[0].match(/第\d+条(?:の\d+)?/)[0];
        // 法あり=親法令へ（常時）。法なし=自文書だが、自文書に実在する条のときだけ（他法引用文中の第N条を誤リンクしない）
        if (tid && (isHou || ARTSET.has(art))){
          const ttl = isHou ? REFTITLE : myTitle;
          out += '<a class="rf" href="?law='+tid+'&art='+encodeURIComponent(art)+'" title="'+esc(ttl)+' '+art+' を開く（クリックで移動）">'+m[0]+'</a>';
          i += m[0].length; continue;
        }
      }
      // 条を含まない項参照（第N項…）→ この条文内の該当項へジャンプ
      if (ch==='第' && aid){
        REFKO.lastIndex = i; const m2 = REFKO.exec(text);
        if (m2 && m2.index === i){
          const pn = m2[0].match(/第(\d+)項/)[1];
          out += '<a class="rf" data-para="'+esc(aid)+':p'+pn+'" title="第'+pn+'項へ移動">'+m2[0]+'</a>';
          i += m2[0].length; continue;
        }
      }
    }
    if (ch==='（' || ch==='('){
      MARKER.lastIndex = i; const mk = MARKER.exec(text);
      if (mk && mk.index === i){ out += mk[0]; i += mk[0].length; continue; }   // 番号カッコは無色のまま
      depth++; out += '<span class="p p'+((depth-1)%6+1)+'">' + ch;
    }
    else if ((ch==='）' || ch===')') && depth>0){ out += ch + '</span>'; depth--; }
    else out += ch;
    i++;
  }
  while (depth-- > 0) out += '</span>';
  return out;
}
function renderDoc(kw){
  const k = (kw||'').trim();
  let html='';
  for (const b of CUR.blocks){
    if (b.t==='h'){ html += `<div class="h lv${b.lv}">${esc(b.x)}</div>`; }
    else {
      const text = (b.num+' '+b.cap+' '+b.body);
      if (k && !text.includes(k)) continue;          // 検索ヒットのみ表示
      const body = render(b.body, k, b.num);
      const cap  = b.cap ? `<span class="cap">${esc(b.cap)}</span>` : '';
      html += `<div class="art" data-num="${esc(b.num)}"><span class="num">${esc(b.num)}</span>${cap}<div class="body">${body}</div></div>`;
    }
  }
  if (k && !/class="art"/.test(html)) html = `<div class="hint">「${esc(k)}」に一致する条文はありません</div>`;
  $('#doc').innerHTML = `<div class="wrap">${html}</div>`;
}

// 本文中の法令参照リンクのクリック → 即時リロードせずアプリ内ジャンプ（ホバーでリンク表示・クリックで移動）
$('#doc').addEventListener('click', e => {
  const a = e.target.closest('a.rf'); if (!a) return;
  e.preventDefault();
  if (a.dataset.para){                          // 同一条文内の項ジャンプ（ページ内スクロール）
    const el = document.getElementById(a.dataset.para);
    if (el){
      document.querySelectorAll('.pa.hit').forEach(x => x.classList.remove('hit'));
      el.classList.add('hit'); el.scrollIntoView({ block:'center' });
    }
    return;
  }
  const u = new URL(a.getAttribute('href'), location.href);
  const law = u.searchParams.get('law'), art = u.searchParams.get('art');
  history.pushState(null, '', '?law=' + law + '&art=' + encodeURIComponent(art));
  $('#search').value = '';
  openLaw(law, art);
});
$('#search').addEventListener('input', e => renderDoc(e.target.value));
$('#burger').addEventListener('click', ()=> $('#side').classList.toggle('open'));

boot().catch(e => { $('#doc').innerHTML = '<div class="wrap"><div class="hint">データの読み込みに失敗しました</div></div>'; });
</script>
</body>
</html>
