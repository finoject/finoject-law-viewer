<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>finoject Financial Regulation Deck</title>
<!-- PWA: デスクトップ／スマホにインストール可能（manifest＋SW）。更新はネットワーク優先で即反映 -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0e1a2e">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="finoject">
<style>
  :root{ --bg:#0b1220; --panel:#111a2c; --line:#26334d; --fg:#e8eefb; --muted:#8da3c6; --accent:#2e6cf0; --hi:#fde68a;
    --tx:#cfe0ff; --txh:#bcd0f0; --lnk:#7fb0ff;   /* テキスト=本文/見出し/リンク（テーマで切替。dark既定は従来色＝見た目不変）*/
    --ctl:#16223a; --ctlh:#1c3a63; }              /* コントロール面(チップ/ボタン/閉じる等)＝テーマで切替 */
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--fg);
    font-family:"Segoe UI","Hiragino Sans","Meiryo",sans-serif; -webkit-text-size-adjust:100%; }
  #app{ display:flex; height:100vh; overflow:hidden; }

  /* サイドバー */
  #side{ width:300px; flex:none; background:var(--panel); border-right:1px solid var(--line);
    overflow-y:auto; padding:10px; }
  /* サイドバーと本文の境目（ドラッグで法令一覧の幅を変更） */
  #sideSplit{ flex:none; width:7px; cursor:col-resize; position:relative; background:transparent; z-index:6; }
  #sideSplit::before{ content:""; position:absolute; left:2px; top:0; bottom:0; width:3px; background:transparent; }
  #sideSplit::after{ content:"⋮"; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); font-size:13px; color:#5f7196;
    background:var(--ctl); border:1px solid #2b66c0; border-radius:5px; padding:6px 1px; line-height:1; opacity:.55; transition:opacity .15s; }
  #sideSplit:hover::before, #sideSplit.drag::before{ background:var(--accent); }
  #sideSplit:hover::after, #sideSplit.drag::after{ opacity:1; color:var(--tx); border-color:var(--accent); }
  #side h1{ font-size:15px; margin:2px 4px 2px; cursor:pointer; }
  #side h1:hover{ color:var(--lnk); }
  #side .sub{ font-size:11px; color:var(--muted); margin:0 4px 8px; }
  #toReg{ display:inline-block; font-size:12px; color:var(--lnk); text-decoration:none; margin:0 4px 10px;
    padding:5px 10px; border:1px solid #2b66c0; border-radius:8px; background:var(--ctl); }
  #toReg:hover{ background:var(--ctlh); }
  .grp{ font-size:11px; color:var(--muted); margin:13px 6px 2px; letter-spacing:.04em; border-left:2px solid var(--accent2); padding-left:8px; display:flex; align-items:center; gap:6px; }
  .grpdesc{ display:flex; flex-wrap:wrap; gap:3px 4px; margin:0 6px 6px; padding-left:10px; }
  .grpdesc .gtag{ font-size:10px; color:var(--muted); background:var(--ctl); border:1px solid var(--hair); border-radius:3px; padding:0 5px; line-height:1.55; white-space:nowrap; }
  /* グループ並び替え */
  .sgrphint{ font-size:10px; color:var(--muted); margin:2px 6px 4px; display:flex; align-items:center; gap:6px; }
  .sgreset{ font-size:10px; padding:2px 7px; border-radius:5px; cursor:pointer; background:var(--ctl); color:var(--tx); border:1px solid var(--line); }
  .sgreset:hover{ border-color:var(--accent); }
  .sgrp{ border-radius:8px; }
  .sgrp.dragging{ opacity:.5; outline:2px dashed var(--accent); }
  .sgrip{ cursor:grab; color:#5f7196; font-size:12px; line-height:1; user-select:none; padding:0 2px; }
  .grp:hover .sgrip{ color:var(--lnk); }
  .sgrip:active{ cursor:grabbing; }
  .law{ display:block; width:100%; text-align:left; cursor:pointer; border:1px solid var(--line);
    background:var(--ctl); color:var(--tx); border-radius:8px; padding:6px 9px; margin:3px 0; font-size:12.5px; line-height:1.35; }
  .law:hover{ border-color:var(--accent); }
  .law.active{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .law .tag{ font-size:10px; color:var(--muted); }
  .law.active .tag{ color:#dbe8ff; }
  .law .upd{ display:inline-block; font-size:10px; background:#fbbf24; color:#0b1220; border-radius:4px; padding:0 5px; margin-left:4px; }

  /* 本体 */
  #main{ flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #top{ flex:none; background:rgba(11,18,32,.96); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:12px 18px; }
  #burger{ display:none; }
  .topbtns{ display:flex; gap:8px; margin-bottom:8px; }
  #home{ background:var(--ctl); color:var(--tx); border:1px solid #2b66c0; border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; }
  #home:hover{ background:var(--ctlh); }
  #lawTitle{ font-size:17px; font-weight:700; margin:0; }
  #lawMeta{ font-size:11px; color:var(--muted); margin:3px 0 0; }
  .fresh{ color:var(--muted); }
  .fresh.stale{ color:#d98a2b; font-weight:700; }
  /* About/方法論リンク（サイドバー下部）＋モーダル */
  #aboutLink{ display:block; width:calc(100% - 8px); margin:12px 4px 4px; padding:7px 9px; font-size:11.5px; text-align:left; cursor:pointer;
    background:transparent; color:var(--muted); border:1px solid var(--line); border-radius:6px; }
  #aboutLink:hover{ border-color:var(--accent); color:var(--lnk); }
  .modal{ position:fixed; inset:0; z-index:120; background:rgba(2,6,16,.62); display:flex; align-items:center; justify-content:center; padding:20px; }
  .modalbox{ position:relative; max-width:560px; width:100%; max-height:84vh; overflow:auto; background:var(--card); color:var(--fg);
    border:1px solid var(--line); border-radius:10px; padding:20px 22px; box-shadow:0 18px 50px rgba(0,0,0,.5); }
  .modalbox h3{ margin:0 0 12px; font-size:15px; }
  .modalx{ position:absolute; top:10px; right:10px; background:var(--ctl); color:var(--tx); border:1px solid var(--line); border-radius:6px; cursor:pointer; padding:2px 9px; }
  .manifesto{ margin:0 0 16px; padding:0 0 14px; border-bottom:1px solid var(--hair); }
  .mani-lead{ margin:0 0 12px; font-size:16px; font-weight:700; letter-spacing:.02em; color:var(--txh); }
  .mani-pt{ margin:0 0 9px; font-size:12.8px; line-height:1.75; color:var(--fg); }
  .mani-pt b{ color:var(--accent); }
  .methlist{ margin:0; font-size:12.5px; line-height:1.65; }
  .methlist dt{ font-weight:700; color:var(--txh); margin-top:9px; }
  .methlist dd{ margin:1px 0 0; color:var(--fg); }
  .methcr{ margin-top:14px; font-size:11px; color:var(--muted); border-top:1px solid var(--hair); padding-top:8px; }
  #lawMeta a{ color:var(--lnk); }
  #search{ margin-top:9px; width:100%; max-width:520px; padding:8px 11px; border-radius:8px; border:1px solid var(--line);
    background:#0e1626; color:var(--fg); font-size:13px; }
  #gsearch{ display:block; width:100%; max-width:680px; padding:10px 13px; border-radius:9px; border:1px solid #3a6bd0;
    background:#0e1626; color:var(--fg); font-size:14px; margin-bottom:8px; }
  #gsearch:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(46,108,240,.3); }
  /* 横断検索の結果 */
  .gres-head{ font-size:13px; color:var(--muted); margin:4px 0 8px; }
  .gres-sub{ font-weight:400; opacity:.8; }
  .gbackbar{ margin:2px 0 8px; }
  .gback{ font-size:12.5px; font-weight:700; padding:5px 12px; border-radius:var(--radius,5px); cursor:pointer; background:var(--ctl); color:var(--lnk); border:1px solid var(--line); }
  .gback:hover{ border-color:var(--accent); }
  .gfbar{ display:flex; flex-wrap:wrap; align-items:center; gap:7px; margin:0 0 14px; }
  .gflabel{ font-size:12px; color:var(--muted); font-weight:700; }
  .gfchip{ font-size:12.5px; padding:5px 11px; border-radius:16px; cursor:pointer; background:var(--ctl); color:var(--tx); border:1px solid var(--line); }
  .gfchip:hover{ border-color:var(--accent); }
  .gfchip.on{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .gupd{ margin-left:6px; font-size:10px; font-weight:700; color:#0b1220; background:#fbbf24; border-radius:4px; padding:1px 5px; }
  .gsec{ font-size:14px; font-weight:700; color:var(--txh); margin:18px 0 4px; border-left:3px solid var(--accent); padding-left:8px; }
  .gsec span{ font-weight:400; color:var(--muted); font-size:12px; }
  .gsec .gtype{ font-weight:700; font-size:10px; color:var(--muted); background:var(--ctl); border:1px solid var(--line); border-radius:3px; padding:1px 5px; margin-right:7px; vertical-align:middle; }
  .ghit{ display:block; text-decoration:none; color:var(--fg); border:1px solid var(--line); border-radius:8px;
    padding:8px 11px; margin:6px 0; background:var(--card); font-size:13px; line-height:1.7; }
  .ghit:hover{ border-color:var(--accent); background:var(--ctl); }
  .ghit .gnum{ font-weight:700; color:var(--lnk); }
  .ghit .gcap{ color:var(--muted); margin-left:6px; }
  .ghit .gsnip{ display:block; color:var(--txh); margin-top:3px; }
  /* ===== 改正差分（新旧対照）===== */
  .diffbtn{ color:var(--accent2); font-weight:700; text-decoration:none; border-bottom:1px solid var(--accent2); }
  .diffbtn:hover{ color:var(--txh); }
  .dhead{ margin:2px 0 14px; }
  .dttl{ font-size:17px; font-weight:800; color:var(--txh); margin:8px 0 3px; }
  .dmeta{ font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .dsample{ font-size:12px; color:var(--txh); background:rgba(201,162,75,.13); border:1px solid var(--accent2); border-radius:6px; padding:8px 11px; margin:0 0 12px; line-height:1.6; }
  .dlist{ display:flex; flex-direction:column; gap:14px; }
  .dart{ border:1px solid var(--line); border-radius:8px; background:var(--card); overflow:hidden; }
  .dhd{ display:flex; align-items:center; flex-wrap:wrap; gap:8px; padding:7px 11px; border-bottom:1px solid var(--hair); background:var(--ctl); }
  .dtag{ font-size:10.5px; font-weight:700; color:#fff; border-radius:4px; padding:1px 7px; }
  .t-chg{ background:#b07a00; } .t-add{ background:#2f8c5f; } .t-del{ background:#b0584f; }
  .dnum{ font-weight:700; color:var(--lnk); }
  .dcap{ color:var(--muted); }
  .dcapchg{ font-size:11px; color:var(--accent2); margin-left:auto; }
  .dcol2{ display:flex; gap:0; }
  .dcol2 .dold{ flex:1 1 0; border-right:1px solid var(--hair); }
  .dcol2 .dnew{ flex:1 1 0; }
  .dold, .dnew{ min-width:0; }
  .dlbl{ font-size:10.5px; font-weight:700; color:var(--muted); padding:5px 11px 0; }
  .dbody{ padding:5px 11px 11px; font-size:13.5px; line-height:1.85; white-space:normal; word-break:break-word; }
  .dbody del{ background:rgba(176,88,79,.22); color:inherit; text-decoration:line-through; text-decoration-color:#b0584f; border-radius:2px; }
  .dbody ins{ background:rgba(47,140,95,.24); color:inherit; text-decoration:none; border-radius:2px; }
  @media(max-width:720px){ .dcol2{ flex-direction:column; } .dcol2 .dold{ border-right:0; border-bottom:1px solid var(--hair); } }
  /* ホームの改正差分ストリップ */
  .dstrip{ display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin:0 0 10px; padding:7px 9px; border:1px solid var(--accent2); border-radius:6px; background:rgba(201,162,75,.08); }
  .dstrip-h{ font-size:11px; font-weight:700; color:var(--accent2); letter-spacing:.04em; margin-right:4px; }
  .dchip{ display:inline-flex; align-items:center; gap:6px; font-size:11.5px; color:var(--tx); text-decoration:none; border:1px solid var(--line); border-radius:5px; padding:2px 8px; background:var(--card); }
  .dchip:hover{ border-color:var(--accent); }
  .dchip-c{ font-size:10px; color:var(--muted); font-variant-numeric:tabular-nums; }
  #doc{ flex:1; overflow-y:auto; padding:8px 22px 80px; }
  #doc .wrap{ max-width:none; margin:0; }   /* 本文はウィンドウ幅いっぱい（行数を減らし実務での視認性を上げる。三根さん指示2026-06-17）*/
  .h{ font-weight:700; color:var(--txh); margin:24px 0 8px; letter-spacing:.01em; word-spacing:.26em; }
  .h.lv1{ font-size:17px; color:var(--txh); margin-top:40px; padding:0 0 6px; border-bottom:1px solid var(--hair); word-spacing:.42em; }  /* 章＝扉的な余白＋番号と見出しの字間 */
  .h.lv1:first-child{ margin-top:6px; }
  .h.lv2{ font-size:14.5px; color:var(--txh); margin-top:26px; word-spacing:.34em; } .h.lv3,.h.lv4,.h.lv5{ font-size:12.5px; color:var(--muted); font-weight:700; }
  .art{ border-bottom:1px solid var(--hair); padding:13px 4px; content-visibility:auto; contain-intrinsic-size:auto 240px; }  /* 画面外の条文は遅延描画（巨大法令を高速化） */
  .art .num{ font-weight:700; color:var(--tx); letter-spacing:.01em; }
  .art .cap{ color:var(--muted); font-size:13px; margin-left:7px; font-weight:600; }
  .art .body{ margin-top:7px; font-size:14.5px; line-height:1.95; white-space:pre-wrap; }  /* 本文はウィンドウ幅いっぱい（行数を減らし実務での視認性を上げる。三根さん指示。max-width制限はしない） */
  .art.target{ background:rgba(46,108,240,.12); border-radius:8px; }
  mark{ background:var(--hi); color:#0b1220; border-radius:2px; padding:0 1px; }
  /* 規制動向パネル（逆引き）＋条文バッジ */
  .regpanel{ border:1px solid #2b66c0; background:var(--card); border-radius:10px; padding:8px 12px; margin:4px 0 16px; }
  .regpanel>summary{ cursor:pointer; font-weight:700; color:var(--lnk); font-size:14px; list-style:none; }
  .regpanel>summary::-webkit-details-marker{ display:none; }
  .regpanel>summary::before{ content:'▾ '; }
  .regpanel:not([open])>summary::before{ content:'▸ '; }
  .rrow{ display:flex; flex-wrap:wrap; align-items:baseline; gap:7px; padding:7px 2px; border-top:1px solid var(--line); font-size:13px; }
  .rrow:first-of-type{ margin-top:6px; }
  .rdate{ color:var(--muted); font-variant-numeric:tabular-nums; flex:none; }
  .rag{ color:var(--txh); font-size:11px; background:var(--ctl); border-radius:5px; padding:1px 6px; flex:none; }
  .rttl{ color:var(--fg); text-decoration:none; flex:1; min-width:200px; }
  .rttl:hover{ color:var(--lnk); text-decoration:underline; }
  .rarts{ font-size:12px; color:var(--lnk); flex-basis:100%; margin-top:2px; }
  .rarts-w{ color:var(--muted); }
  #exportBox{ display:flex; flex-wrap:wrap; align-items:center; gap:7px; margin:2px 0 2px; }
  #exportBox.hidden{ display:none; }
  .exlabel{ font-size:12px; color:var(--muted); }
  #exportBox button{ background:var(--ctl); color:var(--lnk); border:1px solid #2b66c0; border-radius:7px; padding:5px 11px; font-size:12.5px; cursor:pointer; }
  #exportBox button:hover{ background:var(--ctlh); color:var(--tx); }
  .modebtn{ background:var(--ctl); color:var(--tx); border:1px solid var(--line); border-radius:8px; padding:6px 11px; font-size:13px; cursor:pointer; }
  .modebtn:hover{ border-color:var(--accent); }
  /* 学習者モード：条文に集中（規制動向の付帯情報を隠し、行間を広げる） */
  body.mode-learner .regpanel,
  body.mode-learner .artreg{ display:none; }
  body.mode-learner .art .body{ line-height:2.1; }
  .rarts .ra{ color:var(--lnk); text-decoration:none; margin-right:8px; border-bottom:1px dotted #2b66c0; cursor:pointer; }
  .rsub{ font-size:12px; font-weight:700; color:var(--muted); margin:10px 0 2px; padding-top:8px; border-top:1px dashed var(--line); }
  .rsub:first-of-type{ border-top:none; padding-top:0; }
  .nsrc{ flex:none; font-size:11px; font-weight:700; color:#0b1220; background:#9fd0a0; border-radius:5px; padding:1px 6px; }
  .nnote, .dnote{ border-top:none; font-size:11px; }
  .dstatus{ flex:none; font-size:11px; font-weight:700; padding:1px 7px; border-radius:5px; background:#475569; color:#fff; }
  .dstatus.d-ok{ background:#15803d; }       /* 成立 */
  .dstatus.d-active{ background:#b45309; }   /* 審議中・付託・送付・継続 */
  .dstatus.d-dead{ background:#6b7280; }     /* 廃案・否決・撤回・審査未了 */
  /* 条文エリアに差し込む本文ビューア（パネル項目クリック時） */
  #lawview{ display:flex; flex-direction:column; height:calc(100vh - 150px); min-height:560px; margin-top:4px;
    border:1px solid #2b66c0; border-radius:10px; overflow:hidden; background:var(--card); }
  #lawview.hidden{ display:none; }
  .lvbar{ display:flex; align-items:center; gap:10px; padding:8px 11px; border-bottom:1px solid var(--line); flex:none; }
  .lvback{ background:#1d4ed8; color:#fff; border:0; border-radius:7px; cursor:pointer; font-size:13px; font-weight:700; padding:6px 13px; }
  .lvback:hover{ filter:brightness(1.1); }
  .lvttl{ flex:1; min-width:0; font-size:12.5px; color:var(--tx); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lvframe{ flex:1; width:100%; border:0; background:#fff; }
  .lvlink{ cursor:pointer; }
  /* 参照条文のホバー・プレビュー */
  #refpop{ position:fixed; z-index:50; max-width:520px; max-height:46vh; overflow:auto;
    background:var(--card); border:1px solid #2b66c0; border-radius:10px; padding:11px 14px;
    box-shadow:0 10px 34px rgba(0,0,0,.55); font-size:13px; line-height:1.85; }
  #refpop.hidden{ display:none; }
  #refpop .rphead{ border-bottom:1px solid var(--line); padding-bottom:5px; margin-bottom:6px; }
  #refpop .rpnum{ font-weight:700; color:var(--lnk); }
  #refpop .rpcap{ color:var(--muted); margin-left:6px; font-size:12px; }
  #refpop .rpbody{ color:var(--fg); white-space:normal; }
  @media(max-width:640px){ #refpop{ max-width:92vw; } }
  /* 定義語（ホバーで定義をポップアップ）：控えめな点線下線 */
  .gloss{ border-bottom:1px dotted rgba(159,208,255,.55); cursor:help; }
  .gloss:hover{ border-bottom-color:var(--accent); background:rgba(46,108,240,.10); }
  /* 印刷／PDF：UIを隠し、条文を白地・全文展開で印刷 */
  @media print{
    body{ background:#fff; color:#000; }
    #side, #top, #hsplit, #regview, #lawview, .regpanel, .artreg, #refpop { display:none !important; }
    #app, #main, #doc, #artbody{ display:block !important; overflow:visible !important; height:auto !important; }
    #doc{ padding:0; } #doc .wrap{ max-width:none; margin:0; }
    .art{ content-visibility:visible !important; break-inside:avoid; border-color:#ccc; color:#000; }
    .art .num{ color:#000; } .art .cap{ color:#333; }
    .body .p1,.body .p2,.body .p3,.body .p4,.body .p5,.body .p6{ background:transparent; box-shadow:none; }
    .body .pz{ display:inline !important; } .body .el{ display:none !important; }
    .body a.rf{ color:#000; border:0; } .gloss{ border:0; }
    .lawtbl th,.lawtbl td{ border:1px solid #999; color:#000; }
  }
  .rmore{ font-size:12px; color:var(--muted); padding:8px 2px 2px; border-top:1px solid var(--line); }
  .rmore a, .rarts a{ color:var(--lnk); }
  .rk{ font-size:10px; font-weight:700; padding:1px 6px; border-radius:5px; flex:none; background:#475569; color:#fff; }
  .rk.k-パブコメ{ background:#b45309; } .rk.k-改正{ background:#1d4ed8; } .rk.k-公布{ background:#15803d; }
  .rk.k-ガイドライン{ background:#7c3aed; } .rk.k-告示, .rk.k-通達等{ background:#475569; }
  .artreg{ display:inline-block; margin-left:8px; font-size:11px; font-weight:700; color:#fff; background:#b45309;
    border-radius:6px; padding:1px 7px; text-decoration:none; vertical-align:middle; }
  .artreg:hover{ filter:brightness(1.15); }
  /* トップ画面の規制ウォッチ・フィード */
  .home{ padding-bottom:40px; }
  /* ブロック並び替え（ドラッグ） */
  .layoutbar{ font-size:11.5px; color:var(--muted); background:var(--card); border:1px dashed #2b66c0; border-radius:8px; padding:6px 10px; margin:2px 0 10px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }

  /* トップ画面の2カラム（左:フィード／右:本文ビューア）。中央のスプリッタをドラッグで幅可変（ウルトラワイド対応） */
  .homecols{ display:flex; gap:0; align-items:stretch; margin-top:6px; height:var(--colsH, calc(100vh - 170px)); min-height:340px; }
  #feedcol{ flex:0 0 44%; min-width:0; height:100%; overflow:auto; background:var(--card); border:1px solid var(--line); border-radius:10px; padding:2px 4px; }
  /* 上下リサイズ用バー（高さを掴んで変更） */
  #vsplit{ height:14px; cursor:row-resize; position:relative; margin:0 2px; }
  #vsplit::before{ content:""; position:absolute; left:0; right:0; top:6px; height:2px; background:var(--line); border-radius:2px; }
  #vsplit::after{ content:"⋯"; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); font-size:16px; letter-spacing:2px; color:#5f7196; background:var(--ctl); border:1px solid #2b66c0; border-radius:6px; padding:0 8px; line-height:1.2; }
  #vsplit:hover::before, #vsplit.drag::before{ background:var(--accent); }
  #vsplit:hover::after, #vsplit.drag::after{ color:var(--tx); border-color:var(--accent); }
  #hsplit{ flex:0 0 16px; align-self:stretch; cursor:col-resize; position:relative; }
  #hsplit::before{ content:""; position:absolute; left:7px; top:0; bottom:0; width:2px; background:var(--line); border-radius:2px; }
  /* ドラッグ可能と分かるグリップ（⋮）を中央に表示 */
  #hsplit::after{ content:"⋮⋮"; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); writing-mode:vertical-rl;
    letter-spacing:-3px; font-size:14px; color:#5f7196; background:var(--ctl); border:1px solid #2b66c0; border-radius:6px; padding:8px 1px; line-height:1; }
  #hsplit:hover::before, #hsplit.drag::before{ background:var(--accent); }
  #hsplit:hover::after, #hsplit.drag::after{ color:var(--tx); border-color:var(--accent); }
  .spin{ display:inline-block; width:15px; height:15px; margin-right:8px; vertical-align:-2px; border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }

  /* カッコの入れ子の深さで背景色を変える */
  .body .p{ border-radius:3px; padding:0 1px; box-shadow:inset 0 0 0 1px rgba(255,255,255,.12); }
  /* 入れ子で背景が重なり濃く見えるため、各色の不透明度を元の約8割に下げる（2026-06-17三根さん指示。7割は弱すぎ→8割へ）*/

  .body .p3{ background:rgba(21,128,61,.50); }    /* 緑 */

  /* カッコの深さ別 折り畳み（「（…）」表示）。折り畳み規則は #doc[data-pd=N] でJS生成（高速） */

  /* 定義カッコ（「以下「○○」という。」「次条において同じ。」等）は折り畳みモードでも隠さない（実務上の重要定義。三根さん指示2026-06-19）。入れ子も展開し、薄い点線枠で区別 */
  /* 定義カッコは折り畳み時も表示（部分折り畳み時のみ）。「基本構造のみ」= #doc.foldall のときは定義カッコも畳んで完全な骨組みにする */
  #doc[data-pd]:not(.foldall) .p.pk > .pz, #doc[data-pd]:not(.foldall) .p.pk .pz{ display:inline !important; }
  #doc[data-pd]:not(.foldall) .p.pk > .el, #doc[data-pd]:not(.foldall) .p.pk .el{ display:none !important; }

let INDEX=null, CUR=null, cache={}, REF=null, REFTITLE='', ARTSET=new Set(), RPC=[], curMaxDepth=0;

function relArt(aid, delta){ const i=ARTIDX[aid]; if(i==null) return null; return ARTSEQ[i+delta]||null; }
// 相対参照を解決。ctx={aid,curPara,myId, antLaw,antArt,antPara(直前に言及された条/項)}。返り値 {law,art,para,label,set} or null。

function resolveRel(tok, ctx){
  const { aid, curPara, myId } = ctx;
  const pm = tok.match(/第(\d+)項/);
  if (tok.startsWith('同')){                                    // 同条／同条第M項／同項 → 直前に言及された条・項
    const L = ctx.antLaw, A = ctx.antArt;
    if (!L || !A) return null;                                  // 先行する条の言及が無い＝解決不能
    if (L === myId && !ARTSET.has(A)) return null;              // 自文書に実在しない条はリンクしない
    if (tok.startsWith('同条')){
      const para = pm ? +pm[1] : null;
      return { law:L, art:A, para, label:A+(para?'第'+para+'項':''), set:{law:L,art:A,para} };
    }
    if (!ctx.antPara) return null;                              // 同項：直前の項が不明なら解決不能
    return { law:L, art:A, para:ctx.antPara, label:A+'第'+ctx.antPara+'項', set:{law:L,art:A,para:ctx.antPara} };
  }
  if (/^(前条|次条|前々条|次々条)/.test(tok)){                  // 条の相対（現在条から）
    const delta = {前条:-1,次条:1,前々条:-2,次々条:2}[tok.slice(0, tok.indexOf('条')+1)];
    const art = relArt(aid, delta);
    if (!art) return null;                                      // 文書の端＝解決不能
    const para = pm ? +pm[1] : null;
    return { law:myId, art, para, label:art+(para?'第'+para+'項':''), set:{law:myId,art,para} };
  }
  // 前項／次項（現在条の curPara 起点）
  if (!curPara) return null;
  const p = tok.startsWith('前項') ? curPara-1 : curPara+1;
  if (p < 1) return null;
  return { law:myId, art:aid, para:p, label:aid+'第'+p+'項', set:{law:myId,art:aid,para:p} };

// ===== 金融規制ウォッチ連携（逆引き：この法令に関する最近の規制動向を条文に重ねる）=====

const REG_SHORT  = {'金融庁':'金融庁','日本銀行':'日銀','日本取引所グループ':'JPX','日本証券業協会':'日証協','JVCEA':'JVCEA','日本公認会計士協会':'会計士協会'};
const REG_AGENCIES = ['金融庁','日本銀行','日本取引所グループ','日本証券業協会','JVCEA','日本公認会計士協会'];
// 規制動向＋関連ニュースを取得して索引化。force=true は定期再取得（タブを開いたまま最新化）。
async function loadRegNews(force){

    REGLATEST = REGITEMS.reduce((m,it)=> (it.detectedAt && it.detectedAt>m) ? it.detectedAt : m, '');  // 最新巡回で検知＝NEW判定用

// 規制項目（item オブジェクト）の本文を右パネルに描画する共通処理
// ===== AI解説レイヤー（Claude）=====
// セキュリティ: APIキーはクライアントに出さない。本番は serverless（Cloudflare Worker等）の /ai エンドポイント経由でClaudeを呼ぶ。
// 未接続時は null を返し、呼び出し側が「キーワード抽出」などの非AI簡易表示にフォールバック（受け皿UIだけ先に成立させる）。
// 接続するには localStorage に aiEndpoint を設定（例: localStorage.aiEndpoint='https://xxx.workers.dev/ai'）。差し替えはこの1点のみ。
const AIX = {
  // 既定は Cloudflare Worker の /ai（PROXY_BASE）。localStorage.aiEndpoint で上書き可。
  // Worker未対応/未デプロイの間は呼び出しが非ok→nullとなり、UIは受け皿表示に自動フォールバック。
  get endpoint(){ try{ return localStorage.getItem('aiEndpoint') || (PROXY_BASE ? PROXY_BASE+'/ai' : ''); }catch(e){ return PROXY_BASE ? PROXY_BASE+'/ai' : ''; } },
  get enabled(){ return !!this.endpoint; },
  async call(task, payload){                      // {task, payload} を渡しJSONで受け取る共通I/F。Worker側でClaude messages APIに整形する想定。
    if(!this.endpoint) return null;
    const ctl = new AbortController(); const timer = setTimeout(()=>ctl.abort(), 20000);   // 20秒で打切り＝受け皿表示にフォールバック（生成中のまま固まらない）
    try{ const r=await fetch(this.endpoint, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({task, payload}), signal:ctl.signal});
      const j = r.ok ? await r.json() : null; return (j && !j.error) ? j : null; }catch(e){ return null; }
    finally{ clearTimeout(timer); }
  },
  async explainUpdate(it){                         // 規制更新の3行要点（何が起きたか/誰に/どの論点）
    const sig = 'u:'+(it.url||it.title||'')+'|'+(it.date||'');
    const c = AIXCACHE.get(sig); if(c) return c;   // 一度生成したら端末にキャッシュ＝開くたびに再生成しない
    const r = await this.call('update', {title:it.title, agency:it.agency, date:it.date, lawrefs:(it.lawrefs||[]).map(x=>x.label)});
    const out = (r && Array.isArray(r.lines)) ? {lines:r.lines, source:'ai'} : null;
    if(out) AIXCACHE.set(sig, out);
    return out;
  },
  async explainArticle(p){                         // 条文の解説（何を言っているか/実務でどこで効くか/確認点）
    const sig = 'a:'+(p.law||'')+':'+(p.num||'');
    const c = AIXCACHE.get(sig); if(c) return c;   // 同上＝同じ条文は再生成しない（初回のみ生成）
    const r = await this.call('article', {law:p.law, num:p.num, body:(p.body||'').slice(0,4000)});
    const out = (r && r.text) ? {text:r.text, points:r.points||[], source:'ai'} : null;
    if(out) AIXCACHE.set(sig, out);
    return out;
  },
};
// AI結果の端末内キャッシュ（localStorage）。事前生成(夜間バッチ)が無い項目も「初回のみ生成→以後は即時・再生成なし」にする。
const AIXCACHE = {
  _k(s){ let h=5381; for(let i=0;i<s.length;i++) h=((h*33)^s.charCodeAt(i))>>>0; return 'aix_'+h.toString(36); },
  get(sig){ try{ const v=localStorage.getItem(this._k(sig)); return v?JSON.parse(v):null; }catch(e){ return null; } },
  set(sig,val){ try{ localStorage.setItem(this._k(sig), JSON.stringify(val)); }
    catch(e){ try{ Object.keys(localStorage).filter(k=>k.indexOf('aix_')===0).forEach(k=>localStorage.removeItem(k)); localStorage.setItem(this._k(sig), JSON.stringify(val)); }catch(_){} } }
};

function impactTags(text, max){ text=text||''; const out=[]; for(const x of IMPACT_TAGS){ if(x.re.test(text)) out.push(x); if(out.length>=(max||6)) break; } return out; }

// JST基準のISO日付（offsetDays日前）。ブラウザのタイムゾーンに依存せずJSTで判定する。
function isoJST(offsetDays){
  const j=new Date(Date.now()+9*3600000-(offsetDays||0)*86400000), p=n=>String(n).padStart(2,'0');
  return `${j.getUTCFullYear()}-${p(j.getUTCMonth()+1)}-${p(j.getUTCDate())}`;
}
// 規制動向（REGITEMS）＋法令データ更新（INDEX.laws[].updated）を日付付きの共通形に集約
function portalItems(){
  const out=[];
  REGITEMS.forEach((it,gi)=>{ if(it.date) out.push({date:it.date, kind:'reg', agency:it.agency, title:it.title, gi, refs:it.lawrefs||[], aiSummary:it.aiSummary}); });
  const changed=new Set(INDEX&&INDEX.changed||[]);
  ((INDEX&&INDEX.laws)||[]).forEach(l=>{ const u=(l.updated||'').slice(0,10); if(u) out.push({date:u, kind:'law', title:l.title, lawId:l.law_id, ltype:l.type, changed:changed.has(l.title)}); });
  return out;
}

function renderPortalTop(){
  const box=document.getElementById('portalTop'); if(!box) return;
  if(!REGITEMS.length && !(INDEX&&INDEX.laws)){ box.innerHTML='<div class="ptop"><div class="hint" style="padding:14px">読み込み中…</div></div>'; return; }
  const today=isoJST(0), wk=isoJST(7);
  // 並び順（既定=最新順）。「最新動向」なので日付優先が自然。§優先=条文リンクあり、改正反映=データ変化ありを上に。
  const secScore=x=> (x.refs&&x.refs.length)?1:0;          // §＝条文への自動リンクあり
  const chgScore=x=> (x.kind==='law'?x.changed:(x.refs&&x.refs.length))?1:0;   // 改正反映/条文紐づき
  const all=portalItems();
  if(portalSort==='sec')         all.sort((a,b)=> secScore(b)-secScore(a) || b.date.localeCompare(a.date));
  else if(portalSort==='changed') all.sort((a,b)=> chgScore(b)-chgScore(a) || b.date.localeCompare(a.date));
  else                            all.sort((a,b)=> b.date.localeCompare(a.date));   // 'date'＝最新順（既定）
  const todayItems=all.filter(x=>x.date===today);
  const weekItems=all.filter(x=>x.date<today && x.date>=wk);
  const LIM=8;
  const list=(items,emptyMsg)=> items.length
    ? items.slice(0,LIM).map(portalRow).join('') + (items.length>LIM?`<div class="pmore">ほか ${items.length-LIM}件</div>`:'')
    : `<div class="pnone">${emptyMsg}</div>`;
  const seg=(s,label)=>`<span class="psortb${portalSort===s?' on':''}" onclick="setPortalSort('${s}')">${label}</span>`;
  const diffList=Object.values(DIFF_INDEX);
  const diffStrip = diffList.length ? `<div class="dstrip"><span class="dstrip-h">改正差分</span>`
    + diffList.slice(0,8).map(e=>{ const c=e.counts||{}; return `<a class="dchip" href="#" onclick="openDiff('${e.law_id}');return false" title="${esc(e.title)} の新旧対照（改正反映 ${esc((e.to_updated||'').slice(0,10))}）">${esc(e.title)}${e.sample?'〔サンプル〕':''}<span class="dchip-c">変${c.changed||0}/追${c.added||0}/削${c.deleted||0}</span></a>`; }).join('')
    + `</div>` : '';
  box.innerHTML=`<div class="ptop">
    ${trustStatHtml()}
    ${diffStrip}
    <div class="ptophd">最新動向<span class="psort">${seg('date','最新順')}${seg('sec','§優先')}${seg('changed','改正反映')}</span></div>
    <div class="pcols">
      <div class="pblk"><div class="pblkh">本日 <b>(${todayItems.length})</b><span class="pblksub">${jpDay(today)}</span></div>${list(todayItems,'なし')}</div>
      <div class="pblk"><div class="pblkh">直近7日 <b>(${weekItems.length})</b></div>${list(weekItems,'なし')}</div>
    </div>
  </div>`;
}

// サイドバーの法令グループ並び順（ユーザーがドラッグで変更→localStorage 'sideGroupOrder' に保存）
function sideGroupOrder(byG){
  const def = [...G_ORDER, ...Object.keys(byG).filter(g => !G_ORDER.includes(g))].filter(g=>byG[g]);  // 既定順（実在グループのみ）
  let saved=[]; try{ saved=JSON.parse(localStorage.getItem('sideGroupOrder')||'[]'); }catch(e){}
  return [...saved.filter(g=>byG[g]), ...def.filter(g=>!saved.includes(g))];   // 保存順→未知/新規は既定位置で追加
}
function saveSideGroupOrder(){
  const order=[...document.querySelectorAll('#lawList .sgrp')].map(s=>s.dataset.grp);
  localStorage.setItem('sideGroupOrder', JSON.stringify(order));
}
function resetSideGroups(){ localStorage.removeItem('sideGroupOrder'); renderSidebar(); }
function renderSidebar(){
  const byG = {};
  for (const l of INDEX.laws){ (byG[l.group]=byG[l.group]||[]).push(l); }
  const order = sideGroupOrder(byG);
  const custom = !!localStorage.getItem('sideGroupOrder');
  let html = `<div class="sgrphint">⠿ でグループを並び替え${custom?' <button class="sgreset" onclick="resetSideGroups()">既定に戻す</button>':''}</div>`;
  for (const g of order){

    if (GDESC[g]) inner += `<div class="grpdesc">${GDESC[g].split('／').map(t=>`<span class="gtag">${esc(t.trim())}</span>`).join('')}</div>`;
    for (const l of byG[g]){
      const upd = (INDEX.changed||[]).includes(l.title) ? '<span class="upd">更新</span>' : '';
      inner += `<button class="law" data-id="${l.law_id}">
        <div>${esc(l.title)}${upd}</div>

    }
    html += `<div class="sgrp" data-grp="${esc(g)}">${inner}</div>`;
  }
  const el = $('#lawList'); el.innerHTML = html;
  el.querySelectorAll('.law').forEach(b => b.addEventListener('click', ()=> openLaw(b.dataset.id)));

// グループのドラッグ並び替え（⠿ハンドル）。home の並び替えと同じ要領。
let _dragGrp = null;
function setupSideGroupDrag(){
  const cont=document.getElementById('lawList'); if(!cont) return;
  cont.querySelectorAll('.sgrip').forEach(h=>{
    h.addEventListener('dragstart', e=>{ _dragGrp=h.closest('.sgrp'); _dragGrp.classList.add('dragging'); document.body.classList.add('reordering'); e.dataTransfer.effectAllowed='move'; try{e.dataTransfer.setData('text/plain','');}catch(_){} });
    h.addEventListener('dragend', ()=>{ if(_dragGrp)_dragGrp.classList.remove('dragging'); document.body.classList.remove('reordering'); _dragGrp=null; saveSideGroupOrder(); renderSidebar(); });
  });
  cont.addEventListener('dragover', e=>{ if(!_dragGrp) return; e.preventDefault();
    const els=[...cont.querySelectorAll('.sgrp:not(.dragging)')];
    let after=null, best=-Infinity;
    for(const el of els){ const b=el.getBoundingClientRect(); const off=e.clientY-b.top-b.height/2; if(off<0 && off>best){ best=off; after=el; } }
    if(after==null) cont.appendChild(_dragGrp); else cont.insertBefore(_dragGrp, after); });
}

async function loadLaw(id){
  if (cache[id]) return cache[id];
  const r = await fetch(`./data/${id}.json?t=`+Date.now());
  if (!r.ok) throw new Error('HTTP '+r.status);
  const d = await r.json(); cache[id] = d; return d;
}

// データ鮮度スタンプ。INDEX.generatedAt（自動巡回の最終取得時刻）を表示し、48h超なら「更新確認中」警告（沈黙の陳腐化を可視化）。
function jstStamp(iso){ try{ const d=new Date(iso), j=new Date(d.getTime()+9*3600000), p=n=>String(n).padStart(2,'0'); return `${j.getUTCFullYear()}/${p(j.getUTCMonth()+1)}/${p(j.getUTCDate())} ${p(j.getUTCHours())}:${p(j.getUTCMinutes())}`; }catch(e){ return ''; } }
function freshnessHtml(){
  const g = INDEX && INDEX.generatedAt; if(!g) return '';
  const stale = (Date.now() - new Date(g).getTime()) > 48*3600000;
  return stale
    ? `<span class="fresh stale" title="自動取得が滞っている可能性があります。最新は e-Gov 原文でご確認ください。">⚠ 更新確認中（最終取得 ${jstStamp(g)} JST）</span>`
    : `<span class="fresh" title="この時刻に自動取得・反映しました">最終確認 ${jstStamp(g)} JST</span>`;
}

  REFTITLE = REF ? ((INDEX.laws.find(l => l.law_id === REF)||{}).title || '') : '';
  ARTSET = new Set((d.blocks||[]).filter(b => b.num).map(b => b.num));  // 自文書に実在する条番号（自リンクの可否判定用）
  ARTSEQ = (d.blocks||[]).filter(b => b.num).map(b => b.num);            // 文書順（前条/次条の相対参照解決用）
  ARTIDX = {}; ARTSEQ.forEach((n,i)=>{ if(ARTIDX[n]==null) ARTIDX[n]=i; });
  document.querySelectorAll('.law').forEach(b => b.classList.toggle('active', b.dataset.id===id));
  $('#lawTitle').textContent = d.title;
  const updated = (d.updated||'').slice(0,10);
  $('#lawMeta').innerHTML = `${d.type}・${esc(d.law_num)}　|　e-Gov反映: ${updated||'—'}　|　`
    + `<a href="${d.egov_url}" target="_blank" rel="noopener">e-Govで原文を見る ↗</a>　|　${freshnessHtml()}`
    + `<span id="diffBtnSlot">${diffBtnHtml(d.law_id)}</span>`;
  const s = $('#search'); s.classList.remove('hidden'); s.value='';
  $('#pctl').classList.remove('hidden');
  $('#exportBox').classList.remove('hidden');
  renderDoc('');

  // 条文ジャンプ（大きな法令の描画完了を待ってリトライ）
  if (artNum){
    const dec = decodeURIComponent(artNum);
    let tries = 0;
    const scrollTo = () => {
      const t = [...document.querySelectorAll('.art')].find(a => a.dataset.num === dec);
      if (!t) return false;
      t.classList.add('target');
      const pa = para && document.getElementById(dec + ':p' + para);
      if (pa){ pa.classList.add('hit'); pa.scrollIntoView({block:'center'}); } else { t.scrollIntoView({block:'start'}); }
      return true;
    };
    const jump = () => {

// 本文を1パスで処理（エスケープ後・制御文字不要）:
//  ① 検索語ハイライト ② カッコ（）の入れ子の深さで背景色分け（番号・記号だけのカッコは除外）
//  ③ 条文参照リンク … 「法第N条…」→この文書の親法令、「第N条…」（法/名称法を伴わない）→この文書自身。
//     直前が漢字・閉じカッコの場合は対象外（民法・○○法第N条 や （…号）第N条 の誤リンクを防ぐ）。
function render(raw, k, artNum){
  const text = esc(raw);
  // k は検索語（文字列）または語の配列。複数語は長い順にハイライト（部分一致の取りこぼし防止）。
  const kterms = (Array.isArray(k) ? k : (k ? [k] : [])).map(t=>esc(t)).filter(Boolean).sort((a,b)=>b.length-a.length);
  const MARKER = /[（(](?:[0-9０-９一二三四五六七八九十百千〇]+|[ぁ-んァ-ヶa-zA-Zａ-ｚＡ-Ｚ]|注[0-9０-９]*|参考[0-9０-９]*|別[紙表添][0-9０-９]*)[）)]/y;  // 番号・記号・ラベル（注/参考/別紙等）のみのカッコは色付けしない
  const REFJO  = /(法)?第\d+条(?:の\d+)?(?:第\d+項)?(?:第\d+号(?:の\d+)?)?/y;    // 条参照（条あり）
  const REFKO  = /第\d+項(?:第\d+号(?:の\d+)?)?(?:各号)?/y;                       // 項参照（条を含まない＝自条内）
  const REFREL = /(?:同条|前条|次条|前々条|次々条)(?:第\d+項)?|前項|次項|同項/y;     // 相対参照（条/項）
  const DEFKEEP = /以下[^（）()]{0,60}(?:という|と総称|と略称|同じ)|において同じ|以下同じ/;   // 折り畳み時も隠さない定義カッコの目印
  const PARANUM = /\d+(?=[ 　])/y;                                              // 行頭の項番号（数字＋空白）
  const myId = CUR && CUR.law_id, myTitle = (CUR && CUR.title) || '';
  const aid = artNum || '';
  let curPara = 1;                                                             // 現在の項番号（相対参照の解決に使用。第1項=1）
  let antLaw=null, antArt=null, antPara=null;                                  // 直前に言及された 条/項（同条・同項の解決用。リンク可否と独立に記録）
  let skipPeek=0;                                                              // antecedent 記録で「第N条第N項」の内側 第N項 を再検出しないための既読位置
  // 第1項アンカー（本文先頭。第1項は番号が無いため空アンカー）
  let out = aid ? '<span class="pa" id="'+esc(aid)+':p1"></span>' : '';
  let depth=0, i=0;
  while (i < text.length){
    const bol = (i===0) || (text[i-1]==='\n');
    // 主要な列挙項目（①〜⑳ / ⑴〜⒇）の前は1行空けて視認性を上げる（細かいイロハ・号は空けない）
    if (bol && i>0 && /[①-⑳⑴-⒇]/.test(text[i])) out += '\n';
    // 行頭の項番号 → 番号を項アンカーで包む（号/イロハは字下げ＝先頭が空白なので該当しない）
    if (bol && aid && /[0-9]/.test(text[i])){
      PARANUM.lastIndex = i; const pm = PARANUM.exec(text);
      if (pm && pm.index === i){ curPara = +pm[0]; out += '<span class="pa" id="'+esc(aid)+':p'+pm[0]+'">'+pm[0]+'</span>'; i += pm[0].length; continue; }
    }
    if (kterms.length){ let hit=null; for (const t of kterms){ if (text.startsWith(t, i)){ hit=t; break; } } if (hit){ out += '<mark>'+hit+'</mark>'; i += hit.length; continue; } }
    const ch = text[i];
    // 直前に言及された条・項を記録（同条/同項の antecedent）。リンク可否と独立に、すべての条/項言及で更新する。
    // skipPeek: 「第N条第N項」を一括記録した後、その内側の「第N項」を独立した自条項参照として再記録しないための既読位置。
    if (aid && (ch==='第' || ch==='法') && i >= skipPeek){
      REFJO.lastIndex = i; const ma = REFJO.exec(text);
      if (ma && ma.index === i){
        const aart = ma[0].match(/第\d+条(?:の\d+)?/)[0];
        const apm = ma[0].match(/第(\d+)項/);
        // 直前が漢字/閉じ括弧なら外部法の引用（○○法第N条／（…）第N条）。「法」接頭でも ○○法 の末尾なら親法ではなく外部named law。
        const prevK = /[一-鿿々）)」『』]/.test(text[i-1]||'');
        antArt = aart;
        antLaw = ma[1] ? (prevK ? null : REF) : (prevK ? null : (ARTSET.has(aart) ? myId : null));
        antPara = apm ? +apm[1] : null;
        skipPeek = i + ma[0].length;
      } else {
        REFKO.lastIndex = i; const mk = REFKO.exec(text);
        if (mk && mk.index === i){ const mp = mk[0].match(/第(\d+)項/); antArt = aid; antLaw = myId; antPara = mp ? +mp[1] : antPara; skipPeek = i + mk[0].length; }
      }
    }
    // 相対参照（前項/次項/同項/前条/次条/前々条/次々条/同条/同条第M項）→ コンテキストで解決（直前が漢字なら誤検出回避）
    if (aid && (ch==='前'||ch==='次'||ch==='同') && !/[一-鿿々]/.test(text[i-1]||'')){
      REFREL.lastIndex = i; const mr = REFREL.exec(text);
      if (mr && mr.index === i){
        const r = resolveRel(mr[0], { aid, curPara, myId, antLaw, antArt, antPara });
        if (r){

function markGlossary(artEl){
  if(!_glossRe || !artEl || artEl.dataset.gl) return; artEl.dataset.gl='1';
  const bodyEl=artEl.querySelector('.body'); if(!bodyEl) return;
  const art=artEl.dataset.num, sc=GLOSS_ARTSCOPE[art];
  const tns=[]; const w=document.createTreeWalker(bodyEl, NodeFilter.SHOW_TEXT, { acceptNode(n){
    const p=n.parentElement; if(!p||!n.nodeValue) return NodeFilter.FILTER_REJECT;
    if(p.closest('a,.gloss,mark,.cap,.el')) return NodeFilter.FILTER_REJECT;
    _glossRe.lastIndex=0; return _glossRe.test(n.nodeValue)? NodeFilter.FILTER_ACCEPT:NodeFilter.FILTER_REJECT; } });
  let n; while((n=w.nextNode())) tns.push(n);
  for(const tn of tns){ const s=tn.nodeValue, frag=document.createDocumentFragment(); let last=0,m; _glossRe.lastIndex=0;
    while((m=_glossRe.exec(s))){
      if(!selectEntry(normTerm(m[0]), sc, art)) continue;     // この条のスコープで適用できる定義が無ければマークしない
      if(m.index>last) frag.appendChild(document.createTextNode(s.slice(last,m.index)));
      const sp=document.createElement('span'); sp.className='gloss'; sp.dataset.t=m[0]; sp.textContent=m[0]; frag.appendChild(sp); last=m.index+m[0].length;
    }
    if(last<s.length) frag.appendChild(document.createTextNode(s.slice(last)));
    if(frag.childNodes.length) tn.parentNode.replaceChild(frag,tn); }
}
// 表示領域付近の条文だけ定義語マーキング（content-visibilityでも確実。IntersectionObserverは未発火だったため矩形判定方式に）
function markVisibleGloss(){
  if(!_glossRe) return;
  const doc=document.getElementById('doc'); if(!doc) return;
  const dr=doc.getBoundingClientRect();
  const arts=document.querySelectorAll('#artbody .art:not([data-gl])');
  for(const a of arts){ const r=a.getBoundingClientRect();
    if(r.bottom>=dr.top-400 && r.top<=dr.bottom+400) markGlossary(a); }
}
let _glossTimer=null;

function dietSecHtml(lawId){
  const bills = (REGDIET[lawId] && REGDIET[lawId].length) ? REGDIET[lawId] : (REGDIET[LAW_OF[lawId]] || []);
  if(!bills.length) return '';
  const rows = bills.map(b=>{

    const cls = /成立/.test(s) ? 'd-ok' : /審議中|付託|継続|送付/.test(s) ? 'd-active' : /廃案|否決|撤回|未了/.test(s) ? 'd-dead' : '';
    return `<div class="rrow"><span class="dstatus ${cls}">${esc(s||'—')}</span>`
      + `<a class="rttl lvlink" href="${escA(b.url)}" data-lv-url="${escA(b.url)}" data-lv-mode="direct" data-lv-title="${escA(b.name)}">${esc(b.name)}</a>`

  }).join('');

function renderDoc(kw){
  const k = (kw||'').trim();
  const sq = parseSearch(k);                                  // 柔軟検索（スペース=AND / or / and）
  const kt = sq ? sq.terms : null;                            // ハイライト用の語配列
  let html=''; RPC=[];
  const badgedNums = new Set();   // 条番号は法令内で一意でない（附則等で重複）→規制動向バッジは本則（最初の出現）のみ
  for (const b of CUR.blocks){
    if (b.t==='h'){ html += `<div class="h lv${b.lv}">${esc(b.x)}</div>`; }
    else {
      if (sq && !matchSearch(searchText(b), sq)) continue;    // 検索ヒットのみ表示（表セルも対象）
      let body = render(b.body, kt, b.num);
      if (b.tables) body = body.replace(/⟦TBL:(\d+)⟧/g, (m,i) => b.tables[+i] ? tableHtml(b.tables[+i], kt) : '');
      const cap  = b.cap ? `<span class="cap">${esc(b.cap)}</span>` : '';
      let rbadge = '';
      if (CUR && b.num && !badgedNums.has(b.num)){ rbadge = regArtBadge(CUR.law_id, b.num); if (rbadge) badgedNums.add(b.num); }
      html += `<div class="art" data-num="${esc(b.num)}"><span class="num">${esc(b.num)}</span>${cap}${rbadge}<div class="body">${body}</div>`
        + `<button class="aiart" data-ainum="${esc(b.num)}" title="この条文を解説（実務影響・確認ポイント）">解説</button>`
        + `<div class="aiart-panel hidden" data-aip="${esc(b.num)}"></div></div>`;
    }
  }
  if (k && !/class="art"/.test(html)) html = `<div class="hint">「${esc(k)}」に一致する条文はありません</div>`;
  const panel = (CUR && !k) ? regPanelHtml(CUR.law_id) : '';   // 検索中以外は冒頭に規制動向パネル
  // #artbody=条文本体／#lawview=パネル項目クリック時に条文の場所へ差し込む本文ビューア（既定は非表示）
  $('#doc').innerHTML = `<div class="wrap">${panel}<div id="lawview" class="hidden"></div><div id="artbody">${html}</div></div>`;
  curMaxDepth = effMaxDepth(RPC);   // この描画での実効最大カッコ深さ（applyParenが使用）
  applyParen();          // カッコ折り畳み状態を再適用（CSSクラス1発）
  observeGloss();        // 定義語の遅延マーキング（表示中の条文だけ処理＝高速）
}

function orderedLaws(){
  const byG = {}; for (const l of INDEX.laws) (byG[l.group]=byG[l.group]||[]).push(l);
  const groups = [...G_ORDER, ...Object.keys(byG).filter(g => !G_ORDER.includes(g))];
  const out = []; for (const g of groups){ if (byG[g]) out.push(...byG[g]); } return out;

function gSnippet(body, terms){
  body = body || ''; terms = (terms||[]).filter(Boolean);
  // 最初に出現する語の位置でスニペットを切り出し、全語をハイライト
  let pos=-1, found='';
  for (const t of terms){ const i=body.indexOf(t); if (i>=0 && (pos<0||i<pos)){ pos=i; found=t; } }
  if (pos<0) return '';
  const s = Math.max(0,pos-28), e = Math.min(body.length, pos+found.length+60);
  let t = esc((s>0?'…':'') + body.slice(s,e).replace(/\n/g,' ') + (e<body.length?'…':''));
  const escRe = x => x.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  const re = new RegExp('('+terms.map(x=>escRe(esc(x))).filter(Boolean).sort((a,b)=>b.length-a.length).join('|')+')','g');
  return t.replace(re, '<mark>$1</mark>');
}

  const saved=parseInt(localStorage.getItem('sideWidth'),10); if(saved>=180 && saved<=700) side.style.width=saved+'px';
  let drag=false;
  sp.addEventListener('mousedown', e=>{ drag=true; sp.classList.add('drag'); document.body.style.userSelect='none'; e.preventDefault(); });

  window.addEventListener('mouseup', ()=>{ if(!drag) return; drag=false; sp.classList.remove('drag'); document.body.style.userSelect=''; localStorage.setItem('sideWidth', Math.round(side.getBoundingClientRect().width)); });

function dragAfter(cont, y){   // ドロップ位置の直後にくる .hsec を返す（中点比較）
  const els=[...cont.querySelectorAll('.hsec:not(.dragging)')];
  let best={off:-Infinity, el:null};
  for(const el of els){ const b=el.getBoundingClientRect(); const off=y-b.top-b.height/2; if(off<0 && off>best.off) best={off, el}; }
  return best.el;
}

async function fetchYahoo(symbol){

// ビットコイン: Coinbase Exchange の stats（last=現在値, open=24時間前）から価格と24h変化率を1回のCORS取得で算出。
// ※CoinGeckoは15秒ポーリングでHTTP429頻発、Binanceはブラウザからのfetchがブロックされる(Failed to fetch)ため、いずれも不使用（2026-06-19・実機検証で確認）。
async function fetchBTC(){
  try{
    const r=await fetch('https://api.exchange.coinbase.com/products/BTC-USD/stats?_='+Date.now(),{cache:'no-store'});
    if(!r.ok) throw new Error('coinbase '+r.status);
    const j=await r.json(); const last=+j.last, open=+j.open;
    if(!isFinite(last)) throw new Error('no last');
    return { label:'ビットコイン', value:last, change:(isFinite(open)&&open)?((last-open)/open*100):null, source:'Coinbase', note:'リアルタイム・USD建' };
  }catch(e){
    // フォールバック: spot価格（24h変化率なし）
    try{ const r=await fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot?_='+Date.now(),{cache:'no-store'});
      const v=+(await r.json()).data.amount; if(isFinite(v)) return { label:'ビットコイン', value:v, change:null, source:'Coinbase', note:'リアルタイム・USD建' }; }catch(e2){}
    return null;
  }
}
async function mktLive(){

    jobs.push(fetchYahoo(def.sym).then(d=>{
      const change = def.chUnit==='bp' ? (d.prev!=null?(d.value-d.prev)*100:null)   // 利回りは変化をbp(=値差×100)で

// 語句レベル差分（文字単位LCS）。巨大本文は行単位にフォールバック（メモリ保護）。返り値 {o,n}=旧/新のHTML。
function charDiffHtml(oldS, newS){
  oldS=oldS||''; newS=newS||'';
  const SAFE = oldS.length*newS.length <= 16000000;    // ~4000²超は行単位へ（DP配列のメモリ保護）。通常の条はほぼ文字単位で精密表示
  const a = SAFE ? [...oldS] : oldS.split('\n');
  const b = SAFE ? [...newS] : newS.split('\n');
  const join = SAFE ? '' : '\n';
  const n=a.length, m=b.length;
  const dp = Array.from({length:n+1}, ()=> new Uint16Array(m+1));
  for(let i=n-1;i>=0;i--) for(let k=m-1;k>=0;k--) dp[i][k] = a[i]===b[k] ? dp[i+1][k+1]+1 : Math.max(dp[i+1][k], dp[i][k+1]);
  const ops=[]; let i=0,k=0;
  while(i<n&&k<m){ if(a[i]===b[k]){ops.push(['eq',a[i]]);i++;k++;} else if(dp[i+1][k]>=dp[i][k+1]){ops.push(['del',a[i]]);i++;} else {ops.push(['ins',b[k]]);k++;} }
  while(i<n) ops.push(['del',a[i++]]);
  while(k<m) ops.push(['ins',b[k++]]);
  let o='', nn='', t=0;
  while(t<ops.length){ const kind=ops[t][0], buf=[]; while(t<ops.length && ops[t][0]===kind){ buf.push(ops[t][1]); t++; }
    const h = nl2br(esc(buf.join(join)));
    if(kind==='eq'){ o+=h; nn+=h; } else if(kind==='del'){ o+='<del>'+h+'</del>'; } else { nn+='<ins>'+h+'</ins>'; }
  }
  return { o, n:nn };
}

// ===== エクスポート（表示中の法令を Markdown / JSON でダウンロード。クライアントのみ）=====
function pad2(n){ return String(n).padStart(2,'0'); }
function fnameSafe(s){ return (s||'law').replace(/[\\\/:*?"<>|\s（）()]+/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'').slice(0,80); }
// 表データ → Markdownテーブル（rowspan/colspanは簡易フラット化。セル内改行は<br>）
function tableToMd(tbl){
  const rows=(tbl&&tbl.rows)?tbl.rows:(tbl||[]); if(!rows.length) return '';
  const ncol=rows.reduce((m,r)=>Math.max(m,(r.cells||[]).reduce((a,c)=>a+(c.cs||1),0)),0)||1;
  const out=[]; let sep=false;
  for(const r of rows){
    const cells=(r.cells||[]).map(c=>String((c&&c.t)||'').replace(/\|/g,'\\|').replace(/\n/g,'<br>'));
    while(cells.length<ncol) cells.push('');
    out.push('| '+cells.join(' | ')+' |');
    if(!sep){ out.push('|'+' --- |'.repeat(ncol)); sep=true; }
  }
  return out.join('\n');
}
// 条文本文 → Markdown（行構造を保持。占位子⟦TBL:i⟧を表に展開）
function articleBodyMd(b){
  const parts=String(b.body||'').split(/⟦TBL:(\d+)⟧/);
  let md='';
  for(let i=0;i<parts.length;i++){
    if(i%2===1){ const t=b.tables && b.tables[+parts[i]]; md += '\n\n'+(t?tableToMd(t):'')+'\n\n'; }
    else { md += parts[i].split('\n').map(s=>s.replace(/[ \t　]+$/,'')).join('  \n'); }
  }
  return md.replace(/\n{3,}/g,'\n\n').trim();
}
function lawToMarkdown(d){
  const n=new Date(), ds=n.getFullYear()+'/'+pad2(n.getMonth()+1)+'/'+pad2(n.getDate());
  let md='# '+(d.title||'')+'\n\n';
  md+='> '+[d.type,d.law_num].filter(Boolean).join('　')+'  \n';
  md+='> 施行/更新: '+((d.updated||'').slice(0,10)||'—')+'  \n';
  if(d.egov_url) md+='> e-Gov原文: '+d.egov_url+'  \n';
  md+='> エクスポート: '+ds+'（finoject 金融関連法令・規制ウォッチ）\n\n---\n\n';
  for(const b of (d.blocks||[])){
    if(b.t==='h'){ md+='\n**'+(b.x||'')+'**\n\n'; }
    else { md+='## '+(b.num||'')+(b.cap?'　'+b.cap:'')+'\n\n'+articleBodyMd(b)+'\n\n'; }
  }
  return md.replace(/\n{3,}/g,'\n\n');
}
// 現在の（）折り畳み状態のラベル（applyParen と共用）
function parenStateLabel(){ const mx=curMaxDepth; return (pDepth>mx)?'全文':(pDepth<=1?'基本構造（カッコ省略）':('深さ '+(pDepth-1)+' まで')); }
// 現在の法令内検索で「画面に出ている」ブロックだけに絞る（見出しは renderDoc と同様に保持）
function visibleBlocks(d){
  const k=($('#search')?$('#search').value:'').trim(); const sq=k?parseSearch(k):null;
  if(!sq) return d.blocks;
  return d.blocks.filter(b => b.t==='h' ? true : matchSearch(searchText(b), sq));
}
// 「画面に表示されている状態そのまま」を Markdown 化（粒度コントロール）。
//  ・法令内検索で絞り込み中 → 一致した条文だけ。 ・カッコ折り畳み中 → 折り畳んだ見た目（隠れた（）は除外）。
//  実装は描画済みDOM(#artbody)を走査＝CSSで適用済みの折り畳み/絞り込みをそのまま反映（再実装による齟齬を防ぐ）。
function lawToMarkdownVisible(d){
  const body=document.querySelector('#doc #artbody');
  if(!body || !body.querySelector('.art')) return lawToMarkdown(d);   // 未描画時は従来の全文出力
  const n=new Date(), ds=n.getFullYear()+'/'+pad2(n.getMonth()+1)+'/'+pad2(n.getDate());
  const k=($('#search')?$('#search').value:'').trim();
  let md='# '+(d.title||'')+'\n\n';
  md+='> '+[d.type,d.law_num].filter(Boolean).join('　')+'  \n';
  md+='> e-Gov反映: '+((d.updated||'').slice(0,10)||'—')+'  \n';
  if(d.egov_url) md+='> e-Gov原文: '+d.egov_url+'  \n';
  if(k) md+='> 抽出条件: 「'+k+'」に一致する条文のみ  \n';
  md+='> カッコ表示: '+parenStateLabel()+'  \n';
  md+='> エクスポート: '+ds+'（finoject Financial Regulation Deck・表示状態のまま出力）\n\n---\n\n';
  for(const el of body.children){
    if(el.classList.contains('h')){ md += '\n**'+el.textContent.trim()+'**\n\n'; }
    else if(el.classList.contains('art')){
      const num=(el.querySelector('.num')?el.querySelector('.num').textContent:el.getAttribute('data-num')||'').trim();
      const capEl=el.querySelector('.cap'); const cap=capEl?'　'+capEl.textContent.trim():'';
      const bEl=el.querySelector('.body');
      let txt=bEl?(bEl.innerText||bEl.textContent||'').replace(/ /g,' '):'';
      txt=txt.split('\n').map(s=>s.replace(/[ \t　]+$/,'')).join('  \n');
      md += '## '+num+cap+'\n\n'+txt+'\n\n';
    }
  }
  return md.replace(/\n{3,}/g,'\n\n');
}
function lawToJSON(d){
  // 内部の構造化データ＋エクスポートメタ。**法令内検索で絞り込み中はその条文だけ**（粒度コントロール）。条/項/号は num+body(整形済テキスト)、表は tables[] を構造保持。
  const blocks=visibleBlocks(d); const k=($('#search')?$('#search').value:'').trim();
  const out={ _export:{ generatedAt:new Date().toISOString(), source:'finoject Financial Regulation Deck', filter:k||null, articleCount:blocks.filter(b=>b.t!=='h').length },
    law_id:d.law_id, title:d.title, type:d.type, law_num:d.law_num, group:d.group, updated:d.updated, egov_url:d.egov_url,
    blocks };
  return JSON.stringify(out, null, 2);
}
function downloadFile(name, content, mime){
  const blob=new Blob([content],{type:mime+';charset=utf-8'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=name; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 120);
}
function exportLaw(fmt){
  if(!CUR) return; const n=new Date();
  const base=fnameSafe(CUR.title)+'_'+n.getFullYear()+pad2(n.getMonth()+1)+pad2(n.getDate());
  if(fmt==='json') downloadFile(base+'.json', lawToJSON(CUR), 'application/json');
  else downloadFile(base+'.md', lawToMarkdownVisible(CUR), 'text/markdown');
}

// ===== カッコの深さ別 折り畳み（クリックで深度を変化）=====
let pDepth = 99;   // 深さが pDepth 以上の（）を「（…）」に折り畳む（99=全表示）
// 折り畳みは #doc[data-pd=N] のCSS規則で一括制御（全span走査をしないので巨大法令でも高速）。深さ規則を生成
(function buildParenCSS(){
  const MAXD = 14; let css = '';
  for (let pd=1; pd<=MAXD; pd++){
    const hide=[], show=[];
    for (let d=pd; d<=MAXD; d++){ hide.push('#doc[data-pd="'+pd+'"] .p[data-d="'+d+'"]>.pz'); show.push('#doc[data-pd="'+pd+'"] .p[data-d="'+d+'"]>.el'); }
    css += hide.join(',')+'{display:none}\n' + show.join(',')+'{display:inline}\n';
  }
  const st=document.createElement('style'); st.textContent=css; document.head.appendChild(st);
})();
function applyParen(){
  const doc=$('#doc'), mx=curMaxDepth;
  if (pDepth > mx) doc.removeAttribute('data-pd'); else doc.setAttribute('data-pd', pDepth);   // クラス1発（全走査なし）
  doc.classList.toggle('foldall', pDepth<=mx && pDepth<=1);   // 「基本構造のみ」は定義カッコも含め全て畳む（完全な骨組み）
  const st = $('#pctl-state');
  if (st) st.textContent = '［状態: ' + parenStateLabel() + '］';
  // アクティブな表示モードのボタンを明示（全文／基本構造。畳む・戻すは増減アクションなので非ハイライト）
  const mode = (pDepth > mx) ? 'all' : (pDepth <= 1 ? 'skel' : null);
  document.querySelectorAll('#pctl button[data-pa]').forEach(b => b.classList.toggle('active', b.getAttribute('data-pa')===mode));
}
function applyParenAction(a){
  let mx = 0; document.querySelectorAll('#doc .p[data-d]').forEach(el=>{ const d=+el.getAttribute('data-d'); if(d>mx) mx=d; });  // 実DOMから最大カッコ深さを都度算出＝curMaxDepth未設定/陳腐化でも確実に動く
  curMaxDepth = mx;
  if (a==='all') pDepth = mx + 1;
  else if (a==='skel') pDepth = 1;
  else if (a==='less') pDepth = Math.max(1, (pDepth > mx ? mx + 1 : pDepth) - 1);
  else if (a==='more') pDepth = Math.min(mx + 1, pDepth + 1);
  applyParen();
}
$('#pctl').addEventListener('click', e => { const a = e.target.getAttribute('data-pa'); if (a) applyParenAction(a); });
// キーボードショートカット（ヘビーユース向け・三根さん/Gemini要望）: [ =畳む / ] =全文 / \ =基本構造。入力中とモーダル表示中は無効。
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const t = e.target, tag = (t && t.tagName || '').toLowerCase();
  if (tag==='input' || tag==='textarea' || tag==='select' || (t && t.isContentEditable)) return;
  if ($('#pctl').classList.contains('hidden')) return;            // 法令を開いている時だけ有効
  if (document.getElementById('aboutModal')) return;
  if (e.key==='[')        { applyParenAction('less'); e.preventDefault(); }
  else if (e.key===']')   { applyParenAction('all');  e.preventDefault(); }
  else if (e.key==='\\')  { applyParenAction('skel'); e.preventDefault(); }
});
